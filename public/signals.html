<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signals</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }

/* ── Header ── */
.header { padding: 18px 24px 0; display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
.header-left h1 { font-size: 18px; font-weight: 700; color: #f1f5f9; }
.header-left p  { font-size: 12px; color: #475569; margin-top: 3px; }
.header-right   { display: flex; gap: 8px; align-items: center; }
.btn { display: inline-flex; align-items: center; gap: 5px; padding: 6px 13px; border-radius: 7px; font-size: 12px; font-weight: 500; cursor: pointer; border: none; transition: all .15s; }
.btn-ghost  { background: #1a2035; color: #94a3b8; border: 1px solid #253047; }
.btn-ghost:hover { background: #1e2845; color: #e2e8f0; }
.btn-green { background: #1D9E75; color: #fff; }
.btn-green:hover { background: #188a65; }
.ts { font-size: 11px; color: #334155; }

/* ── Stats strip ── */
.stats-strip { display: flex; gap: 8px; padding: 14px 24px 0; flex-wrap: wrap; }
.stat-card { background: #141928; border: 1px solid #1e2a3a; border-radius: 10px; padding: 12px 16px; cursor: pointer; transition: all .15s; min-width: 80px; }
.stat-card:hover { border-color: #2a3f5f; }
.stat-card.active { border-color: var(--c); background: #0d1624; }
.stat-icon { font-size: 15px; margin-bottom: 5px; }
.stat-val  { font-size: 22px; font-weight: 700; color: #f1f5f9; line-height: 1; }
.stat-label{ font-size: 10px; color: #475569; margin-top: 3px; text-transform: uppercase; letter-spacing: .5px; }
.stat-known{ font-size: 10px; color: #1D9E75; margin-top: 2px; }

/* ── Toolbar ── */
.toolbar { display: flex; gap: 8px; padding: 14px 24px 0; align-items: center; flex-wrap: wrap; }
.filter-pill { background: #141928; border: 1px solid #1e2a3a; border-radius: 20px; padding: 5px 13px; font-size: 12px; color: #94a3b8; cursor: pointer; transition: all .15s; white-space: nowrap; }
.filter-pill:hover { border-color: #2a3f5f; color: #e2e8f0; }
.filter-pill.active { background: #0d2a1f; border-color: #1D9E75; color: #1D9E75; }
.toolbar-spacer { flex: 1; }
select.filter-sel { background: #141928; border: 1px solid #1e2a3a; border-radius: 7px; color: #94a3b8; font-size: 12px; padding: 5px 10px; cursor: pointer; }
select.filter-sel:focus { outline: none; border-color: #1D9E75; color: #e2e8f0; }
.known-toggle { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #64748b; cursor: pointer; }
.known-toggle input { accent-color: #1D9E75; }

/* ── Signal list ── */
.content { padding: 12px 24px 24px; }
.signal-list { display: flex; flex-direction: column; gap: 6px; }

/* ── Signal card ── */
.sig-card { background: #141928; border: 1px solid #1e2a3a; border-radius: 10px; padding: 14px 16px; display: flex; align-items: flex-start; gap: 14px; transition: border-color .15s; position: relative; }
.sig-card:hover { border-color: #2a3f5f; }
.sig-card.known { border-left: 3px solid #1D9E75; }
.sig-card.positive { border-left: 3px solid #F59E0B; background: #13160e; }
.sig-card.derived-badge::after { content: 'DERIVED'; position: absolute; top: 8px; right: 10px; font-size: 9px; color: #334155; letter-spacing: .5px; }

.sig-type-icon { flex-shrink: 0; width: 36px; height: 36px; border-radius: 10px; background: #1a2035; display: flex; align-items: center; justify-content: center; font-size: 17px; margin-top: 1px; }

.sig-body { flex: 1; min-width: 0; }
.sig-top { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
.sig-name { font-size: 14px; font-weight: 600; color: #f1f5f9; }
.sig-name a { color: #1D9E75; text-decoration: none; }
.sig-name a:hover { text-decoration: underline; }
.sig-type-label { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; }
.sig-sub  { font-size: 12px; color: #64748b; margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sig-msg  { font-size: 12px; color: #94a3b8; margin-top: 6px; background: #1a2035; border-radius: 6px; padding: 7px 10px; border-left: 2px solid #253047; font-style: italic; max-width: 600px; }
.sig-meta { font-size: 11px; color: #334155; margin-top: 6px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.sig-camp { color: #2563EB; font-size: 11px; }
.sig-acct { color: #475569; font-size: 11px; }

.known-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; color: #1D9E75; background: #0d2a1f; border: 1px solid #1a4a30; border-radius: 10px; padding: 1px 7px; }

/* ── Actions ── */
.ai-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 700; border-radius: 6px; padding: 2px 8px; }
.ai-hot  { background: #450a0a; color: #f87171; border: 1px solid #991b1b; }
.ai-warm { background: #451a03; color: #fb923c; border: 1px solid #9a3412; }
.ai-cold { background: #1a1a2e; color: #475569; border: 1px solid #253047; }
.sig-actions { display: flex; gap: 6px; flex-shrink: 0; align-items: flex-start; margin-top: 2px; flex-wrap: wrap; max-width: 160px; justify-content: flex-end; }
.act-btn { padding: 5px 11px; border-radius: 6px; font-size: 11px; font-weight: 500; cursor: pointer; border: none; transition: all .15s; white-space: nowrap; }
.act-primary { background: #1D9E75; color: #fff; }
.act-primary:hover { background: #188a65; }
.act-secondary { background: #1a2035; color: #94a3b8; border: 1px solid #253047; }
.act-secondary:hover { background: #1e2845; color: #e2e8f0; }
.act-dismiss { background: transparent; color: #334155; border: 1px solid #1a2035; }
.act-dismiss:hover { color: #64748b; border-color: #253047; }

/* ── Empty / Loading ── */
.empty { text-align: center; padding: 60px 20px; color: #334155; }
.empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty-text { font-size: 15px; color: #475569; margin-bottom: 6px; }
.empty-sub  { font-size: 12px; color: #2d3a52; }
.loading { text-align: center; padding: 40px; color: #475569; font-size: 13px; }

/* ── Pagination ── */
.pager { display: flex; gap: 6px; justify-content: center; margin-top: 16px; }
.page-btn { background: #141928; border: 1px solid #1e2a3a; border-radius: 6px; color: #64748b; font-size: 12px; padding: 5px 12px; cursor: pointer; transition: all .15s; }
.page-btn:hover { border-color: #2a3f5f; color: #e2e8f0; }
.page-btn.active { background: #1D9E75; border-color: #1D9E75; color: #fff; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>⚡ Signals</h1>
    <p>LinkedIn intent events — who engaged, when, and what to do next</p>
  </div>
  <div class="header-right">
    <span class="ts" id="ts-label">—</span>
    <button class="btn btn-ghost" onclick="load()">↻ Refresh</button>
  </div>
</div>

<div class="stats-strip" id="stats-strip">
  <div class="stat-card active" style="--c:#1D9E75" data-type="all" onclick="setType('all',this)">
    <div class="stat-icon">⚡</div>
    <div class="stat-val" id="stat-all">—</div>
    <div class="stat-label">All Signals</div>
  </div>
</div>

<div class="toolbar">
  <label class="known-toggle">
    <input type="checkbox" id="known-only" onchange="load()"> Known contacts only
  </label>
  <div class="toolbar-spacer"></div>
  <select class="filter-sel" id="limit-sel" onchange="load()">
    <option value="25">25 per page</option>
    <option value="50" selected>50 per page</option>
    <option value="100">100 per page</option>
  </select>
</div>

<div class="content">
  <div id="signal-list" class="signal-list">
    <div class="loading">Loading signals…</div>
  </div>
  <div id="pager" class="pager"></div>
</div>

<script>
const WS_ID = parseInt(new URLSearchParams(location.search).get('workspace_id')) || 1;
const WS_NAME = new URLSearchParams(location.search).get('workspace_name') || '';
let currentType = 'all';
let currentPage = 1;
let signalSource = 'real';

const SIGNAL_META = {
  invite_accepted:    { icon: '🤝', label: 'Accepted Invite',    color: '#1D9E75' },
  message_received:   { icon: '💬', label: 'Replied',            color: '#3B82F6' },
  positive_reply:     { icon: '⭐', label: 'Positive Reply',     color: '#F59E0B' },
  profile_view:       { icon: '👁️', label: 'Viewed Profile',    color: '#8B5CF6' },
  invitation_received:{ icon: '🔔', label: 'Sent Us Invite',     color: '#EC4899' },
  reaction_received:  { icon: '👍', label: 'Liked Post',         color: '#F97316' },
  comment_received:   { icon: '💭', label: 'Commented',          color: '#06B6D4' },
  company_follow:     { icon: '🏢', label: 'Followed Company',   color: '#6366F1' },
  new_relation:       { icon: '✅', label: 'Connected',          color: '#10B981' },
};

const ACTION_FOR = {
  invite_accepted:    { label: '💬 Send Message', action: 'send_message' },
  message_received:   { label: '↗ Open Chat',    action: 'open_chat'    },
  positive_reply:     { label: '↗ Open Chat',    action: 'open_chat'    },
  profile_view:       { label: '➕ Send Invite',  action: 'send_invite'  },
  invitation_received:{ label: '✅ Accept',       action: 'accept_invite'},
  reaction_received:  { label: '➕ Send Invite',  action: 'send_invite'  },
  comment_received:   { label: '💬 Reply',        action: 'send_message' },
  company_follow:     { label: '➕ Send Invite',  action: 'send_invite'  },
  new_relation:       { label: '💬 Send Message', action: 'send_message' },
};

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function ago(ts) {
  if (!ts) return '';
  const d = Math.round((Date.now() - new Date(ts)) / 1000);
  if (d < 60)   return `${d}s ago`;
  if (d < 3600) return `${Math.round(d/60)}m ago`;
  if (d < 86400)return `${Math.round(d/3600)}h ago`;
  return `${Math.round(d/86400)}d ago`;
}

function setType(t, el) {
  currentType = t; currentPage = 1;
  document.querySelectorAll('.stat-card').forEach(c => c.classList.remove('active'));
  el?.classList.add('active');
  load();
}

async function loadStats() {
  try {
    const data = await fetch(`/api/signals/stats?workspace_id=${WS_ID}`).then(r=>r.json());
    const strip = document.getElementById('stats-strip');
    const d = data.derived || {};
    const types = [
      { type: 'all',            icon: '⚡', label: 'All',          val: d.total || data.total_real || 0 },
      { type: 'positive_reply', icon: '⭐', label: 'Positive',     val: d.positive_replies || 0, c: '#F59E0B' },
      { type: 'message_received',icon:'💬',  label: 'Replied',      val: d.replies || 0, c: '#3B82F6' },
      { type: 'invite_accepted', icon: '🤝', label: 'Connections',  val: d.connections || 0, c: '#1D9E75' },
      ...data.real_signals.filter(s => !['positive_reply','message_received','invite_accepted','new_relation'].includes(s.type))
        .map(s => ({ type: s.type, icon: SIGNAL_META[s.type]?.icon||'📌', label: SIGNAL_META[s.type]?.label||s.type, val: parseInt(s.n), c: SIGNAL_META[s.type]?.color }))
    ].filter(t => t.val > 0 || t.type === 'all');

    strip.innerHTML = types.map((t,i) => `
      <div class="stat-card ${i===0?'active':''}" style="--c:${t.c||'#1D9E75'}"
           data-type="${t.type}" onclick="setType('${t.type}',this)">
        <div class="stat-icon">${t.icon}</div>
        <div class="stat-val">${t.val.toLocaleString()}</div>
        <div class="stat-label">${t.label}</div>
      </div>
    `).join('');
    document.getElementById('stat-all')?.replaceWith?.();
  } catch(e) { console.warn('stats error', e); }
}

async function load() {
  const limit = parseInt(document.getElementById('limit-sel')?.value||50);
  const knownOnly = document.getElementById('known-only')?.checked;
  document.getElementById('signal-list').innerHTML = '<div class="loading">Loading signals…</div>';

  let url = `/api/signals?workspace_id=${WS_ID}&page=${currentPage}&limit=${limit}`;
  if (currentType !== 'all') url += `&type=${currentType}`;
  if (knownOnly) url += '&is_known=true';

  try {
    const data = await fetch(url).then(r=>r.json());
    signalSource = data.source || 'real';
    document.getElementById('ts-label').textContent = `Updated ${new Date().toLocaleTimeString()}`;
    renderList(data.items || [], data.total, limit);
    renderPager(data.total, limit, data.page);
  } catch(e) {
    document.getElementById('signal-list').innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-text">Error loading signals</div><div class="empty-sub">${esc(e.message)}</div></div>`;
  }
}

function renderList(items, total, limit) {
  const list = document.getElementById('signal-list');
  if (!items.length) {
    list.innerHTML = `<div class="empty">
      <div class="empty-icon">📡</div>
      <div class="empty-text">No signals yet</div>
      <div class="empty-sub">LinkedIn events will appear here as they arrive via webhooks</div>
    </div>`;
    return;
  }

  list.innerHTML = items.map(s => {
    const meta   = SIGNAL_META[s.type] || { icon: '📌', label: s.type, color: '#64748b' };
    const action = ACTION_FOR[s.type];
    const name   = s.actor_name || [s.first_name, s.last_name].filter(Boolean).join(' ') || 'Unknown';
    const liUrl  = s.actor_li_url || s.contact_li_url || '';
    const company= s.contact_company || '';
    const title  = s.contact_title || s.actor_headline || '';
    const sub    = [title, company].filter(Boolean).join(' @ ');
    const isPositive = s.type === 'positive_reply' || s.ai_priority === 'HOT';
    const chatId = s.chat_id || null;
    const enrId  = s.enrollment_id || null;

    // AI priority badge
    const aiPri = s.ai_priority;
    const aiBadge = aiPri === 'HOT'  ? `<span class="ai-badge ai-hot">🔥 HOT</span>`
                  : aiPri === 'WARM' ? `<span class="ai-badge ai-warm">🌡️ WARM</span>`
                  : aiPri === 'COLD' ? `<span class="ai-badge ai-cold">❄️ COLD</span>`
                  : '';

    return `<div class="sig-card ${s.is_known?'known':''} ${isPositive?'positive':''}" id="sig-${s.id}">
      <div class="sig-type-icon" style="background:${meta.color}22;color:${meta.color}">${meta.icon}</div>
      <div class="sig-body">
        <div class="sig-top">
          <div class="sig-name">
            ${liUrl ? `<a href="${esc(liUrl)}" target="_blank">${esc(name)}</a>` : esc(name)}
          </div>
          <span class="sig-type-label" style="background:${meta.color}22;color:${meta.color}">${meta.label}</span>
          ${aiBadge}
          ${s.is_known ? `<span class="known-badge">✓ Known</span>` : ''}
        </div>
        ${sub ? `<div class="sig-sub">${esc(sub)}</div>` : ''}
        ${s.ai_reason ? `<div style="font-size:11px;color:#64748b;margin-top:4px;font-style:italic">🤖 ${esc(s.ai_reason)}</div>` : ''}
        ${s.content ? `<div class="sig-msg">${esc(s.content.slice(0,200))}</div>` : ''}
        <div class="sig-meta">
          <span>${ago(s.occurred_at || s.created_at)}</span>
          ${s.account_name  ? `<span class="sig-acct">via ${esc(s.account_name)}</span>` : ''}
          ${s.ai_fit_score ? `<span style="color:#475569">fit: ${s.ai_fit_score}/10</span>` : ''}
        </div>
      </div>
      <div class="sig-actions">
        ${aiPri === 'HOT' ? `<button class="act-btn act-primary" style="background:#dc2626" onclick="handleAction('reply_now','${esc(String(s.id))}','${esc(chatId||'')}','${esc(liUrl)}','${esc(name)}')">🔥 Reply Now</button>` : ''}
        ${action && aiPri !== 'HOT' ? `<button class="act-btn act-primary" onclick="handleAction('${action.action}','${esc(String(s.id))}','${esc(chatId||'')}','${esc(liUrl)}','${esc(name)}')">${action.label}</button>` : ''}
        ${s.enrollment_id ? `<button class="act-btn act-secondary" onclick="goToEnrollment(${enrId})">View</button>` : ''}
        <button class="act-btn act-dismiss" onclick="dismiss('${s.id}')">✕</button>
      </div>
    </div>`;
  }).join('');
}

function renderPager(total, limit, page) {
  const pages = Math.ceil(total / limit);
  const pager = document.getElementById('pager');
  if (pages <= 1) { pager.innerHTML = ''; return; }
  pager.innerHTML = Array.from({length: Math.min(pages,10)}, (_,i) => i+1)
    .map(p => `<button class="page-btn ${p===page?'active':''}" onclick="goPage(${p})">${p}</button>`)
    .join('');
}

function goPage(p) { currentPage = p; load(); }

function handleAction(action, sigId, chatId, liUrl, name) {
  if (action === 'open_chat' && chatId) {
    window.parent?.postMessage({ type: 'open-inbox-contact', action: 'open_inbox_contact', chat_id: chatId, name }, '*');
  } else if (action === 'open_chat') {
    window.parent?.postMessage({ type: 'open-inbox-contact', action: 'open_inbox_contact', li_profile_url: liUrl, name }, '*');
  } else {
    alert(`Action "${action}" for ${name} — coming soon`);
  }
}

function goToEnrollment(enrId) {
  window.parent?.postMessage({ type: 'show-enrollment', enrollment_id: enrId }, '*');
}

function dismiss(sigId) {
  const card = document.getElementById(`sig-${sigId}`);
  if (card) card.style.opacity = '0.3';
  fetch(`/api/signals/${sigId}/dismiss`, { method: 'POST' }).catch(()=>{});
}

// Init
loadStats();
load();
setInterval(load, 60000);
</script>
</body>
</html>
