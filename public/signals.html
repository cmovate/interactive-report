<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signals</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }

.header { padding: 20px 24px 0; display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
.header h1 { font-size: 20px; font-weight: 600; color: #f1f5f9; }
.header p  { font-size: 13px; color: #64748b; margin-top: 2px; }
.header-right { display: flex; gap: 8px; align-items: center; }

.btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 7px; font-size: 12px; font-weight: 500; cursor: pointer; border: none; transition: all .15s; }
.btn-secondary { background: #1e2333; color: #94a3b8; border: 1px solid #2d3748; }
.btn-secondary:hover { background: #252c3f; color: #e2e8f0; }
.btn-primary { background: #1D9E75; color: #fff; }
.btn-primary:hover { background: #17875f; }

.content { padding: 16px 24px; }

/* Stats strip */
.stats { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
.stat { background: #161b2e; border: 1px solid #1e2a3a; border-radius: 8px; padding: 12px 16px; min-width: 100px; cursor: pointer; transition: border-color .15s; }
.stat:hover { border-color: #2d4a6e; }
.stat.active { border-color: #1D9E75; background: #0d1e17; }
.stat-val { font-size: 20px; font-weight: 700; color: #f1f5f9; }
.stat-label { font-size: 11px; color: #64748b; margin-top: 2px; text-transform: uppercase; letter-spacing: .4px; }
.stat-icon { font-size: 16px; margin-bottom: 4px; }

/* Filters row */
.filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; align-items: center; }
.filter-label { font-size: 12px; color: #64748b; }
select.filter-sel { background: #1e2333; border: 1px solid #2d3748; border-radius: 6px; color: #e2e8f0; font-size: 12px; padding: 6px 10px; cursor: pointer; }
select.filter-sel:focus { outline: none; border-color: #1D9E75; }

/* Signal list */
.signal-list { display: flex; flex-direction: column; gap: 2px; }

.signal-item { background: #161b2e; border: 1px solid #1e2a3a; border-radius: 8px; padding: 12px 16px; display: flex; align-items: flex-start; gap: 12px; transition: border-color .15s; }
.signal-item:hover { border-color: #2d3a52; }
.signal-item.known { border-left: 3px solid #1D9E75; }

.signal-icon { font-size: 18px; flex-shrink: 0; width: 32px; height: 32px; border-radius: 50%; background: #1e2333; display: flex; align-items: center; justify-content: center; margin-top: 2px; }

.signal-body { flex: 1; min-width: 0; }
.signal-who { font-size: 13px; font-weight: 600; color: #f1f5f9; }
.signal-who a { color: #1D9E75; text-decoration: none; }
.signal-who a:hover { text-decoration: underline; }
.signal-what { font-size: 12px; color: #94a3b8; margin-top: 2px; }
.signal-what .company { color: #60a5fa; font-weight: 500; }
.signal-content { font-size: 12px; color: #64748b; margin-top: 4px; background: #0f1117; padding: 6px 10px; border-radius: 5px; line-height: 1.5; max-height: 60px; overflow: hidden; cursor: pointer; }
.signal-content.expanded { max-height: none; }

.signal-meta { display: flex; align-items: center; gap: 10px; margin-top: 6px; flex-wrap: wrap; }
.signal-time { font-size: 11px; color: #475569; }
.signal-type-badge { font-size: 10px; font-weight: 600; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; letter-spacing: .5px; }

.badge-profile_view    { background: #1e2a3a; color: #7dd3fc; }
.badge-post_like       { background: #1a1a00; color: #fde68a; }
.badge-post_comment    { background: #160d2e; color: #c4b5fd; }
.badge-invite_received { background: #0d2240; color: #93c5fd; }
.badge-invite_accepted { background: #0d2a1f; color: #6ee7b7; }
.badge-message_received{ background: #1a1000; color: #fcd34d; }
.badge-company_follow  { background: #0d1a35; color: #818cf8; }

.signal-actions { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; }
.signal-tag { font-size: 10px; background: #0d2a1f; color: #34d399; padding: 2px 6px; border-radius: 10px; font-weight: 600; }
.action-btn-sm { background: #1e2333; border: 1px solid #2d3748; color: #94a3b8; padding: 4px 8px; border-radius: 5px; font-size: 11px; cursor: pointer; white-space: nowrap; }
.action-btn-sm:hover { background: #252c3f; color: #e2e8f0; }

/* Pagination */
.pagination { display: flex; gap: 6px; justify-content: center; margin-top: 16px; align-items: center; }
.page-btn { background: #1e2333; border: 1px solid #2d3748; color: #94a3b8; padding: 6px 14px; border-radius: 6px; font-size: 12px; cursor: pointer; }
.page-btn.active { background: #1D9E75; color: #fff; border-color: #1D9E75; }
.page-info { font-size: 12px; color: #64748b; }

/* Empty */
.empty { text-align: center; padding: 60px 20px; color: #475569; }
.empty-icon { font-size: 40px; margin-bottom: 12px; }
.loading { text-align: center; padding: 40px; color: #475569; font-size: 13px; }

/* Add-to-list modal */
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.7); display: flex; align-items: center; justify-content: center; z-index: 100; }
.modal { background: #161b2e; border: 1px solid #1e2a3a; border-radius: 12px; padding: 28px; width: 360px; }
.modal h2 { font-size: 15px; font-weight: 600; color: #f1f5f9; margin-bottom: 6px; }
.modal p { font-size: 13px; color: #64748b; margin-bottom: 16px; }
.modal select { width: 100%; background: #0f1117; border: 1px solid #2d3748; border-radius: 7px; color: #e2e8f0; font-size: 13px; padding: 9px 12px; margin-bottom: 16px; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

/* Toast */
.toast { position: fixed; bottom: 24px; right: 24px; background: #1e2a3a; border: 1px solid #2d3748; color: #e2e8f0; padding: 12px 18px; border-radius: 8px; font-size: 13px; z-index: 999; animation: fi .2s; }
.toast.success { border-color: #1D9E75; color: #34d399; }
.toast.error { border-color: #ef4444; color: #f87171; }
@keyframes fi { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>Signals</h1>
    <p>Inbound LinkedIn events — profile views, likes, invites, messages</p>
  </div>
  <div class="header-right">
    <span id="refresh-indicator" style="font-size:11px;color:#475569"></span>
    <button class="btn btn-secondary" onclick="load()">↻ Refresh</button>
  </div>
</div>

<div class="content">
  <!-- Stats strip -->
  <div class="stats" id="statsStrip"></div>

  <!-- Filters -->
  <div class="filters">
    <span class="filter-label">Filter:</span>
    <select class="filter-sel" id="typeFilter" onchange="onFilterChange()">
      <option value="">All types</option>
      <option value="invite_accepted">Invite Accepted</option>
      <option value="message_received">Message Received</option>
      <option value="invite_received">Invite Received</option>
      <option value="profile_view">Profile View</option>
      <option value="post_like">Post Like</option>
      <option value="post_comment">Post Comment</option>
      <option value="company_follow">Company Follow</option>
    </select>
    <select class="filter-sel" id="knownFilter" onchange="onFilterChange()">
      <option value="">All contacts</option>
      <option value="true">Known contacts only</option>
      <option value="false">Unknown only</option>
    </select>
    <select class="filter-sel" id="limitSel" onchange="onFilterChange()">
      <option value="50">50 per page</option>
      <option value="100">100 per page</option>
    </select>
  </div>

  <div id="signalList"></div>
  <div class="pagination" id="paginationEl" style="display:none"></div>
</div>

<!-- Add to list modal -->
<div class="modal-bg" id="addModal" style="display:none">
  <div class="modal">
    <h2 id="addModalTitle">Add to List</h2>
    <p>Choose a list to add this contact to. If they don't exist yet, they'll be created.</p>
    <select id="addListSelect"></select>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeAddModal()">Cancel</button>
      <button class="btn btn-primary" onclick="doAddToList()">Add to List</button>
    </div>
  </div>
</div>

<script>
const params  = new URLSearchParams(location.search);
const WS_ID   = params.get('workspace_id') || 1;
const BASE    = '';

let currentPage  = 1;
let totalPages   = 1;
let activeType   = '';
let addingSignalId = null;
let lists        = [];

const TYPE_META = {
  profile_view:     { icon: '👁',  label: 'viewed your profile' },
  post_like:        { icon: '👍',  label: 'liked your post' },
  post_comment:     { icon: '💬',  label: 'commented on your post' },
  invite_received:  { icon: '📨',  label: 'sent you a connection request' },
  invite_accepted:  { icon: '🤝',  label: 'accepted your connection request' },
  message_received: { icon: '✉️',  label: 'sent you a message' },
  company_follow:   { icon: '🏢',  label: 'followed your company page' },
};

async function api(path, opts={}) {
  const r = await fetch(BASE + path, { headers: {'Content-Type':'application/json'}, ...opts });
  return r.json();
}

function toast(msg, type='') {
  const t = document.createElement('div');
  t.className = 'toast' + (type ? ' '+type : '');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function timeAgo(ts) {
  if (!ts) return '';
  const diff = Math.floor((Date.now() - new Date(ts)) / 1000);
  if (diff < 60)    return 'Just now';
  if (diff < 3600)  return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  if (diff < 86400*7) return Math.floor(diff/86400) + 'd ago';
  return new Date(ts).toLocaleDateString('en-US', { month:'short', day:'numeric' });
}

// ── Load stats ─────────────────────────────────────────────────────────────
async function loadStats() {
  const types = ['invite_accepted','message_received','invite_received','profile_view','post_like','post_comment','company_follow'];
  const counts = await Promise.all(types.map(t =>
    api(`/api/signals?workspace_id=${WS_ID}&type=${t}&limit=1`).then(d => ({ type: t, count: d.total || 0 }))
  ));
  const total = counts.reduce((s,c) => s + c.count, 0);

  const strip = document.getElementById('statsStrip');
  const allCard = `<div class="stat ${!activeType?'active':''}" onclick="setTypeFilter('')">
    <div class="stat-icon">📊</div>
    <div class="stat-val">${total}</div>
    <div class="stat-label">All signals</div>
  </div>`;
  const typeCards = counts.filter(c=>c.count>0).map(c => {
    const m = TYPE_META[c.type] || { icon: '📌', label: c.type };
    const label = c.type.replace(/_/g,' ');
    return `<div class="stat ${activeType===c.type?'active':''}" onclick="setTypeFilter('${c.type}')">
      <div class="stat-icon">${m.icon}</div>
      <div class="stat-val">${c.count}</div>
      <div class="stat-label">${label}</div>
    </div>`;
  }).join('');
  strip.innerHTML = allCard + typeCards;
}

// ── Load feed ──────────────────────────────────────────────────────────────
async function load() {
  document.getElementById('signalList').innerHTML = '<div class="loading">Loading signals…</div>';

  const type    = document.getElementById('typeFilter').value;
  const known   = document.getElementById('knownFilter').value;
  const limit   = parseInt(document.getElementById('limitSel').value) || 50;

  let url = `/api/signals?workspace_id=${WS_ID}&limit=${limit}&page=${currentPage}`;
  if (type)  url += `&type=${type}`;
  if (known) url += `&is_known=${known}`;

  const data   = await api(url);
  const items  = data.items || [];
  totalPages   = data.pages || 1;

  document.getElementById('refresh-indicator').textContent =
    `${data.total || 0} total · updated ${new Date().toLocaleTimeString()}`;

  if (!items.length) {
    document.getElementById('signalList').innerHTML = `
      <div class="empty">
        <div class="empty-icon">📡</div>
        <div style="font-size:14px">No signals yet</div>
        <div style="font-size:12px;margin-top:6px;color:#334155">LinkedIn events will appear here as they arrive via webhooks</div>
      </div>`;
    document.getElementById('paginationEl').style.display = 'none';
    return;
  }

  const html = items.map(s => {
    const m    = TYPE_META[s.type] || { icon: '📌', label: s.type };
    const who  = s.first_name || s.actor_name || 'Someone';
    const whoFull = [s.first_name, s.last_name].filter(Boolean).join(' ') || s.actor_name || 'Unknown';
    const liUrl   = s.contact_li_url || s.actor_li_url;
    const company = s.company || s.target_account_name || '';

    return `<div class="signal-item ${s.is_known ? 'known' : ''}">
      <div class="signal-icon">${m.icon}</div>
      <div class="signal-body">
        <div class="signal-who">
          ${liUrl
            ? `<a href="${esc(liUrl)}" target="_blank">${esc(whoFull)}</a>`
            : esc(whoFull)}
          ${company ? `<span style="color:#64748b;font-weight:400"> · </span><span class="company">${esc(company)}</span>` : ''}
        </div>
        <div class="signal-what">${m.label}</div>
        ${s.content ? `<div class="signal-content" onclick="this.classList.toggle('expanded')">${esc(s.content.slice(0,200))}${s.content.length>200?'…':''}</div>` : ''}
        ${s.post_url ? `<div style="margin-top:4px"><a href="${esc(s.post_url)}" target="_blank" style="font-size:11px;color:#1D9E75">View post ↗</a></div>` : ''}
        <div class="signal-meta">
          <span class="signal-type-badge badge-${s.type}">${s.type.replace(/_/g,' ')}</span>
          <span class="signal-time">${timeAgo(s.occurred_at || s.created_at)}</span>
          ${s.is_known ? '<span style="font-size:10px;background:#0d2a1f;color:#34d399;padding:2px 6px;border-radius:10px;font-weight:600">In your lists</span>' : ''}
        </div>
      </div>
      <div class="signal-actions">
        ${!s.is_known ? `<button class="action-btn-sm" onclick="openAddModal(${s.id}, '${esc(whoFull)}')">+ Add to list</button>` : ''}
        ${liUrl ? `<a href="${esc(liUrl)}" target="_blank" class="action-btn-sm" style="text-decoration:none">View profile</a>` : ''}
      </div>
    </div>`;
  }).join('');

  document.getElementById('signalList').innerHTML = `<div class="signal-list">${html}</div>`;
  renderPagination(data.total, limit);
}

function renderPagination(total, limit) {
  const el = document.getElementById('paginationEl');
  if (totalPages <= 1) { el.style.display = 'none'; return; }
  el.style.display = 'flex';
  let html = '';
  if (currentPage > 1) html += `<button class="page-btn" onclick="goPage(${currentPage-1})">← Prev</button>`;
  html += `<span class="page-info">Page ${currentPage} of ${totalPages} · ${total} signals</span>`;
  if (currentPage < totalPages) html += `<button class="page-btn" onclick="goPage(${currentPage+1})">Next →</button>`;
  el.innerHTML = html;
}

function goPage(p) { currentPage = p; load(); }

function setTypeFilter(type) {
  activeType = type;
  document.getElementById('typeFilter').value = type;
  currentPage = 1;
  load();
  loadStats();
}

function onFilterChange() { currentPage = 1; load(); }

// ── Add to list modal ──────────────────────────────────────────────────────
async function openAddModal(signalId, name) {
  addingSignalId = signalId;
  document.getElementById('addModalTitle').textContent = `Add ${name} to List`;

  if (!lists.length) {
    const d = await api(`/api/lists?workspace_id=${WS_ID}`);
    lists = d.items || [];
  }

  const sel = document.getElementById('addListSelect');
  sel.innerHTML = lists.map(l => `<option value="${l.id}">${esc(l.name)} (${l.contact_count||0} contacts)</option>`).join('');
  document.getElementById('addModal').style.display = 'flex';
}

function closeAddModal() {
  document.getElementById('addModal').style.display = 'none';
  addingSignalId = null;
}

async function doAddToList() {
  const listId = parseInt(document.getElementById('addListSelect').value);
  if (!listId || !addingSignalId) return;

  const r = await api(`/api/signals/${addingSignalId}/add-to-list`, {
    method: 'POST',
    body: JSON.stringify({ workspace_id: WS_ID, list_id: listId }),
  });

  if (r.error) { toast(r.error, 'error'); return; }
  toast('Contact added to list', 'success');
  closeAddModal();
  load();
}

// ── Auto-refresh every 2 minutes ───────────────────────────────────────────
setInterval(() => { if (currentPage === 1) load(); }, 120000);

// ── Init ───────────────────────────────────────────────────────────────────
loadStats();
load();
</script>
</body>
</html>
