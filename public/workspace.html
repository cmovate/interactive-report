<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workspace</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; display: flex; min-height: 100vh; }
.sidebar { width: 220px; background: white; border-right: 1px solid #e5e5e5; padding: 20px 0; display: flex; flex-direction: column; flex-shrink: 0; }
.sidebar-header { padding: 0 16px 20px; border-bottom: 1px solid #f0f0f0; margin-bottom: 8px; }
.sidebar-ws { font-size: 15px; font-weight: 600; color: #111; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sidebar-back { font-size: 12px; color: #1D9E75; cursor: pointer; margin-top: 4px; display: inline-block; }
.sidebar-back:hover { text-decoration: underline; }
.nav-item { display: flex; align-items: center; padding: 10px 16px; font-size: 14px; color: #555; cursor: pointer; border-radius: 0; transition: background 0.1s; }
.nav-item:hover { background: #f5f5f5; color: #111; }
.nav-item.active { background: #F0FBF7; color: #1D9E75; font-weight: 500; border-right: 2px solid #1D9E75; }
.content { flex: 1; overflow: auto; }
.screen { display: none; }
.screen.active { display: block; }
</style>
</head>
<body>
<div class="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-ws" id="ws-name">Workspace</div>
    <span class="sidebar-back" onclick="window.location.href='/'">&larr; All workspaces</span>
  </div>
  <div class="nav-item active" onclick="showScreen('campaigns')" id="nav-campaigns">Campaigns</div>
  <div class="nav-item" onclick="showScreen('all-data')" id="nav-all-data">All Data</div>
  <div class="nav-item" onclick="showScreen('settings')" id="nav-settings">Settings</div>
</div>
<div class="content">
  <div class="screen active" id="screen-campaigns"></div>
  <div class="screen" id="screen-all-data"></div>
  <div class="screen" id="screen-settings"></div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const workspaceId = params.get('id');
let workspaceName = 'Workspace';

async function init() {
  if (!workspaceId) { window.location.href = '/'; return; }
  try {
    const res = await fetch('/api/workspaces');
    const data = await res.json();
    const ws = (data.items || []).find(w => String(w.id) === String(workspaceId));
    if (ws) { workspaceName = ws.name; document.getElementById('ws-name').textContent = ws.name; document.title = ws.name; }
  } catch(e) {}
  loadScreen('campaigns');
}

let loaded = {};

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
  if (!loaded[name]) loadScreen(name);
}

function loadScreen(name) {
  loaded[name] = true;
  const frame = document.createElement('iframe');
  frame.src = `/${name}.html?workspace_id=${workspaceId}&workspace_name=${encodeURIComponent(workspaceName)}`;
  frame.style.cssText = 'width:100%;height:100vh;border:none;';
  document.getElementById('screen-' + name).innerHTML = '';
  document.getElementById('screen-' + name).appendChild(frame);
}

init();
</script>
</body>
</html>
