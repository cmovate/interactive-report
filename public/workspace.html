<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workspace</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; display: flex; min-height: 100vh; }
.sidebar { width: 220px; background: white; border-right: 1px solid #e5e5e5; padding: 20px 0 0; display: flex; flex-direction: column; flex-shrink: 0; min-height: 100vh; }
.sidebar-header { padding: 0 16px 20px; border-bottom: 1px solid #f0f0f0; margin-bottom: 8px; }
.sidebar-ws { font-size: 15px; font-weight: 600; color: #111; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sidebar-back { font-size: 12px; color: #1D9E75; cursor: pointer; margin-top: 4px; display: inline-block; }
.sidebar-back:hover { text-decoration: underline; }
.nav-section { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: #bbb; padding: 12px 16px 4px; }
.nav-item { display: flex; align-items: center; gap: 8px; padding: 10px 16px; font-size: 14px; color: #555; cursor: pointer; transition: background 0.1s; }
.nav-item:hover { background: #f5f5f5; color: #111; }
.nav-item.active { background: #F0FBF7; color: #1D9E75; font-weight: 500; border-right: 2px solid #1D9E75; }
.nav-item .nav-icon { font-size: 15px; }
.nav-new-badge { font-size: 9px; font-weight: 700; background: #1D9E75; color: white; border-radius: 3px; padding: 1px 4px; margin-left: 4px; }
.sidebar-footer { margin-top: auto; border-top: 1px solid #f0f0f0; padding: 10px 14px; display: flex; flex-direction: column; gap: 8px; }
.sidebar-account { display: flex; align-items: center; gap: 10px; padding: 6px 2px; }
.sidebar-avatar-wrap { width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg,#DBEAFE,#C7F2D8); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #1E5F3E; flex-shrink: 0; overflow: hidden; border: 2px solid #e5e5e5; position: relative; }
.sidebar-avatar-wrap img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; display: block; }
.sidebar-avatar-initials { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #1E5F3E; }
.sidebar-account-info { min-width: 0; }
.sidebar-account-name { font-size: 12px; font-weight: 500; color: #333; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 140px; }
.sidebar-account-badge { font-size: 10px; color: #aaa; margin-top: 1px; display: flex; align-items: center; gap: 3px; }
.li-dot { width: 6px; height: 6px; border-radius: 50%; background: #0A66C2; display: inline-block; }
.content { flex: 1; overflow: auto; }
.screen { display: none; }
.screen.active { display: block; }
</style>
</head>
<body>
<div class="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-ws" id="ws-name">Workspace</div>
    <span class="sidebar-back" onclick="window.location.href='/'">&#8592; All workspaces</span>
  </div>

  <div class="nav-section">Outreach</div>
  <div class="nav-item active" onclick="showScreen('campaigns')" id="nav-campaigns">
    <span class="nav-icon">&#128203;</span> Campaigns
  </div>
  <div class="nav-item" onclick="showScreen('lists')" id="nav-lists">
    <span class="nav-icon">&#128101;</span> Lists
  </div>

  <div class="nav-section">Intelligence</div>
  <div class="nav-item" onclick="showScreen('opportunities')" id="nav-opportunities">
    <span class="nav-icon">&#128161;</span> Opportunities
    <span class="nav-new-badge">NEW</span>
  </div>
  <div class="nav-item" onclick="showScreen('feed')" id="nav-feed">
    <span class="nav-icon">&#128240;</span> Feed
  </div>
  <div class="nav-item" onclick="showScreen('inbox')" id="nav-inbox">
    <span class="nav-icon">&#128140;</span> Inbox
  </div>

  <div class="nav-section">Account</div>
  <div class="nav-item" onclick="showScreen('settings')" id="nav-settings">
    <span class="nav-icon">&#9881;</span> Settings
  </div>

  <div class="sidebar-footer" id="sidebar-footer" style="display:none;"></div>
</div>

<div class="content">
  <div class="screen active" id="screen-campaigns"></div>
  <div class="screen" id="screen-lists"></div>
  <div class="screen" id="screen-opportunities"></div>
  <div class="screen" id="screen-feed"></div>
  <div class="screen" id="screen-inbox"></div>
  <div class="screen" id="screen-settings"></div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const workspaceId = params.get('id');
let workspaceName = 'Workspace';

function initials(name) {
  return String(name||'?').split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase();
}

async function loadAccounts() {
  try {
    const res  = await fetch('/api/workspaces/'+workspaceId+'/accounts');
    const data = await res.json();
    const accounts = data.items || [];
    if (!accounts.length) return;
    const footer = document.getElementById('sidebar-footer');
    footer.style.display = 'flex';
    footer.innerHTML = accounts.map(acc => {
      const name = acc.full_name || acc.display_name || acc.account_id;
      const ini  = initials(name);
      const avatarInner = acc.avatar_url
        ? '<img src="'+acc.avatar_url+'" alt="" loading="lazy" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'"><span class="sidebar-avatar-initials" style="display:none;">'+ini+'</span>'
        : '<span class="sidebar-avatar-initials">'+ini+'</span>';
      return '<div class="sidebar-account" title="'+name+'"><div class="sidebar-avatar-wrap">'+avatarInner+'</div><div class="sidebar-account-info"><div class="sidebar-account-name">'+name+'</div><div class="sidebar-account-badge"><span class="li-dot"></span> LinkedIn</div></div></div>';
    }).join('');
  } catch(e) { console.warn('[Sidebar] Could not load accounts:', e.message); }
}

async function init() {
  if (!workspaceId) { window.location.href='/'; return; }
  try {
    const res = await fetch('/api/workspaces');
    const data = await res.json();
    const ws = (data.items||[]).find(w=>String(w.id)===String(workspaceId));
    if (ws) { workspaceName=ws.name; document.getElementById('ws-name').textContent=ws.name; document.title=ws.name; }
  } catch(e) {}
  loadAccounts();
  loadScreen('campaigns');
}

let loaded = {};

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');
  if (!loaded[name]) loadScreen(name);
}

function loadScreen(name) {
  loaded[name] = true;
  var fileMap = {lists: 'lists-ui'};
  var fname = fileMap[name] || name;
  var frame = document.createElement('iframe');
  frame.style.cssText = 'width:100%;height:100vh;border:none;';
  frame.src = '/' + fname + '.html?workspace_id=' + workspaceId + '&workspace_name=' + encodeURIComponent(workspaceName);
  document.getElementById('screen-' + name).appendChild(frame);
}

init();
</script>
</body>
</html>
