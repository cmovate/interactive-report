<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Post Scheduler</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f7f6f3;
    --surface: #ffffff;
    --border: #e8e4de;
    --text: #1a1a18;
    --muted: #8a8680;
    --accent: #1D9E75;
    --accent-dark: #167a5b;
    --accent-light: #e8f7f2;
    --warn: #e8811a;
    --warn-light: #fff4e8;
    --danger: #d93030;
    --scheduled: #1D9E75;
    --draft: #8a8680;
    --published: #0a66c2;
    --shadow: 0 1px 3px rgba(0,0,0,.08);
    --radius: 10px;
  }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; height: 100vh; overflow: hidden; }

  /* Layout */
  .layout { display: flex; height: 100vh; }
  .main { flex: 1; overflow-y: auto; padding: 24px; }

  /* Header */
  .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  .page-header h1 { font-size: 20px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 8px; }
  .header-actions { display: flex; gap: 8px; }

  /* Account selector */
  .account-bar { display: flex; align-items: center; gap: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 14px; margin-bottom: 20px; }
  .account-bar label { font-size: 12px; color: var(--muted); font-weight: 500; white-space: nowrap; }
  .account-bar select { border: none; outline: none; font-size: 13px; font-weight: 600; color: var(--text); background: transparent; cursor: pointer; }

  /* Stats row */
  .stats-row { display: flex; gap: 12px; margin-bottom: 24px; }
  .stat-card { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 18px; }
  .stat-card .stat-num { font-size: 24px; font-weight: 700; }
  .stat-card .stat-label { font-size: 11px; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: .5px; }
  .stat-card.scheduled .stat-num { color: var(--scheduled); }
  .stat-card.draft .stat-num { color: var(--draft); }
  .stat-card.published .stat-num { color: var(--published); }

  /* Posts table */
  .posts-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .posts-section .section-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid var(--border); }
  .section-title { font-size: 13px; font-weight: 600; }
  .filter-tabs { display: flex; gap: 4px; }
  .filter-tab { padding: 4px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; border: 1px solid transparent; color: var(--muted); background: transparent; }
  .filter-tab.active { background: var(--accent-light); color: var(--accent); border-color: var(--accent); font-weight: 600; }
  .filter-tab:hover:not(.active) { background: var(--bg); }

  .posts-list { }
  .post-row { display: flex; align-items: flex-start; gap: 14px; padding: 16px 18px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background .15s; }
  .post-row:last-child { border-bottom: none; }
  .post-row:hover { background: #fafaf8; }
  .post-row.selected { background: var(--accent-light); }

  .post-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--accent); color: #fff; display: flex; align-items: center; justify-content: font-size: 13px; justify-content: center; font-weight: 700; font-size: 13px; flex-shrink: 0; }
  .post-body { flex: 1; min-width: 0; }
  .post-account { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
  .post-text { font-size: 13px; color: var(--text); line-height: 1.5; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
  .post-meta { display: flex; align-items: center; gap: 10px; margin-top: 6px; }
  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge.scheduled { background: var(--accent-light); color: var(--accent); }
  .badge.draft { background: #f0eeeb; color: var(--muted); }
  .badge.published { background: #e8f0fb; color: var(--published); }
  .badge.failed { background: #fce8e8; color: var(--danger); }
  .post-time { font-size: 11px; color: var(--muted); }
  .post-actions { display: flex; gap: 6px; opacity: 0; transition: opacity .15s; flex-shrink: 0; }
  .post-row:hover .post-actions { opacity: 1; }
  .post-action-btn { width: 28px; height: 28px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; color: var(--muted); }
  .post-action-btn:hover { background: var(--bg); color: var(--text); }
  .post-action-btn.danger:hover { background: #fce8e8; color: var(--danger); border-color: #f5c5c5; }

  .empty-state { padding: 48px 24px; text-align: center; color: var(--muted); }
  .empty-state .empty-icon { font-size: 36px; margin-bottom: 12px; }
  .empty-state p { font-size: 13px; }

  /* Compose panel */
  .compose-panel { width: 420px; flex-shrink: 0; border-left: 1px solid var(--border); background: var(--surface); height: 100vh; overflow-y: auto; display: flex; flex-direction: column; }
  .compose-header { padding: 18px 20px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .compose-header h3 { font-size: 15px; font-weight: 700; }
  .compose-close { width: 28px; height: 28px; border-radius: 6px; border: none; background: var(--bg); cursor: pointer; font-size: 16px; color: var(--muted); display: flex; align-items: center; justify-content: center; }
  .compose-close:hover { background: var(--border); }
  .compose-body { flex: 1; padding: 20px; display: flex; flex-direction: column; gap: 16px; }

  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; }
  .field select, .field input[type=datetime-local], .field input[type=text] {
    border: 1.5px solid var(--border); border-radius: 8px; padding: 9px 12px;
    font-size: 13px; font-family: inherit; color: var(--text); background: var(--surface);
    outline: none; transition: border-color .15s; width: 100%;
  }
  .field select:focus, .field input:focus { border-color: var(--accent); }

  .textarea-wrap { position: relative; }
  .post-textarea {
    width: 100%; min-height: 140px; border: 1.5px solid var(--border); border-radius: 8px;
    padding: 12px; font-size: 13px; font-family: inherit; color: var(--text);
    resize: vertical; outline: none; transition: border-color .15s; line-height: 1.6;
  }
  .post-textarea:focus { border-color: var(--accent); }
  .char-count { position: absolute; bottom: 8px; right: 10px; font-size: 11px; color: var(--muted); pointer-events: none; }
  .char-count.warn { color: var(--warn); }
  .char-count.over { color: var(--danger); }

  .ai-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .ai-chip {
    padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: 500;
    border: 1px solid var(--border); background: var(--bg); cursor: pointer; color: var(--text);
    display: flex; align-items: center; gap: 4px; transition: all .15s;
  }
  .ai-chip:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
  .ai-chip.loading { opacity: .6; pointer-events: none; }

  .schedule-toggle { display: flex; gap: 8px; }
  .toggle-btn {
    flex: 1; padding: 8px; border-radius: 8px; border: 1.5px solid var(--border);
    background: var(--surface); cursor: pointer; font-size: 12px; font-weight: 600;
    color: var(--muted); text-align: center; transition: all .15s;
  }
  .toggle-btn.active { border-color: var(--accent); background: var(--accent-light); color: var(--accent); }
  .toggle-btn:hover:not(.active) { border-color: var(--border); background: var(--bg); }

  .compose-footer { padding: 16px 20px; border-top: 1px solid var(--border); display: flex; gap: 8px; }

  /* Buttons */
  .btn { padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all .15s; display: inline-flex; align-items: center; gap: 6px; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: var(--accent-dark); }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
  .btn-secondary { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { background: var(--border); }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--bg); color: var(--text); }

  /* Preview */
  .li-preview { border: 1px solid var(--border); border-radius: 10px; padding: 14px; background: #fff; }
  .li-preview-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .li-preview-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--accent); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 15px; }
  .li-preview-name { font-size: 13px; font-weight: 700; }
  .li-preview-headline { font-size: 11px; color: var(--muted); }
  .li-preview-text { font-size: 13px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; color: #1a1a18; }
  .li-preview-text.empty { color: var(--muted); font-style: italic; }

  /* Calendar mini */
  .calendar-strip { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; }
  .cal-day { flex-shrink: 0; width: 44px; border-radius: 8px; padding: 6px 4px; text-align: center; cursor: pointer; border: 1.5px solid var(--border); background: var(--surface); }
  .cal-day.has-post { border-color: var(--accent); background: var(--accent-light); }
  .cal-day.today { font-weight: 700; }
  .cal-day .cal-weekday { font-size: 10px; color: var(--muted); text-transform: uppercase; }
  .cal-day .cal-num { font-size: 15px; font-weight: 600; margin-top: 1px; }
  .cal-day .cal-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); margin: 3px auto 0; }

  /* Toast */
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: #1a1a18; color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: 500; transition: transform .3s; z-index: 1000; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { background: var(--accent); }
  .toast.error { background: var(--danger); }

  .spinner { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.3); border-top-color: white; border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="layout">
  <!-- Main content -->
  <div class="main">
    <div class="page-header">
      <h1>📅 Post Scheduler</h1>
      <div class="header-actions">
        <button class="btn btn-primary" onclick="openCompose()">✏️ New Post</button>
      </div>
    </div>

    <!-- Account selector -->
    <div class="account-bar">
      <label>Account:</label>
      <select id="account-sel" onchange="onAccountChange()">
        <option value="">Loading...</option>
      </select>
    </div>

    <!-- Calendar strip -->
    <div id="calendar-strip" class="calendar-strip" style="margin-bottom:20px;"></div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card scheduled">
        <div class="stat-num" id="stat-scheduled">0</div>
        <div class="stat-label">Scheduled</div>
      </div>
      <div class="stat-card draft">
        <div class="stat-num" id="stat-drafts">0</div>
        <div class="stat-label">Drafts</div>
      </div>
      <div class="stat-card published">
        <div class="stat-num" id="stat-published">0</div>
        <div class="stat-label">Published</div>
      </div>
    </div>

    <!-- Posts list -->
    <div class="posts-section">
      <div class="section-header">
        <span class="section-title">Posts</span>
        <div class="filter-tabs">
          <button class="filter-tab active" onclick="setFilter('all', this)">All</button>
          <button class="filter-tab" onclick="setFilter('scheduled', this)">Scheduled</button>
          <button class="filter-tab" onclick="setFilter('draft', this)">Drafts</button>
          <button class="filter-tab" onclick="setFilter('published', this)">Published</button>
        </div>
      </div>
      <div class="posts-list" id="posts-list">
        <div class="empty-state">
          <div class="empty-icon">📝</div>
          <p>No posts yet. Create your first scheduled post.</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Compose panel -->
  <div class="compose-panel" id="compose-panel" style="display:none;">
    <div class="compose-header">
      <h3 id="compose-title">New Post</h3>
      <button class="compose-close" onclick="closeCompose()">✕</button>
    </div>
    <div class="compose-body">
      <!-- Account -->
      <div class="field">
        <label>Post as</label>
        <select id="compose-account"></select>
      </div>

      <!-- Content -->
      <div class="field">
        <label>Content</label>
        <div class="textarea-wrap">
          <textarea class="post-textarea" id="post-content" placeholder="What do you want to share on LinkedIn?" oninput="onContentInput()" maxlength="3000"></textarea>
          <span class="char-count" id="char-count">0 / 3000</span>
        </div>
      </div>

      <!-- AI tools -->
      <div class="field">
        <label>AI Assist</label>
        <div class="ai-row">
          <button class="ai-chip" onclick="aiAssist('improve')">✨ Improve</button>
          <button class="ai-chip" onclick="aiAssist('shorten')">✂️ Shorten</button>
          <button class="ai-chip" onclick="aiAssist('hooks')">🎯 Add hook</button>
          <button class="ai-chip" onclick="aiAssist('emojis')">😊 Add emojis</button>
          <button class="ai-chip" onclick="aiAssist('cta')">📣 Add CTA</button>
        </div>
      </div>

      <!-- Preview -->
      <div class="field">
        <label>Preview</label>
        <div class="li-preview">
          <div class="li-preview-header">
            <div class="li-preview-avatar" id="preview-avatar">?</div>
            <div>
              <div class="li-preview-name" id="preview-name">Select account</div>
              <div class="li-preview-headline" id="preview-headline">LinkedIn</div>
            </div>
          </div>
          <div class="li-preview-text empty" id="preview-text">Your post will appear here...</div>
        </div>
      </div>

      <!-- Schedule type -->
      <div class="field">
        <label>When to post</label>
        <div class="schedule-toggle">
          <button class="toggle-btn active" id="toggle-schedule" onclick="setScheduleMode('schedule')">📅 Schedule</button>
          <button class="toggle-btn" id="toggle-draft" onclick="setScheduleMode('draft')">💾 Save Draft</button>
        </div>
      </div>

      <!-- Date/time picker -->
      <div class="field" id="datetime-field">
        <label>Date & Time</label>
        <input type="datetime-local" id="schedule-datetime" />
      </div>
    </div>

    <div class="compose-footer">
      <button class="btn btn-secondary btn-ghost" onclick="closeCompose()">Cancel</button>
      <button class="btn btn-primary" id="save-btn" onclick="savePost()" style="margin-left:auto;">📅 Schedule</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const params = new URLSearchParams(window.location.search);
const wsId = params.get('workspace_id');
const wsName = params.get('workspace_name') || 'Workspace';

let accounts = [];
let posts = [];
let editingPostId = null;
let currentFilter = 'all';
let scheduleMode = 'schedule';
const STORAGE_KEY = `el-via-scheduler-posts-${wsId}`;

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  await loadAccounts();
  loadPostsFromStorage();
  renderCalendar();
  renderPosts();
  updateStats();
  setDefaultDateTime();
}

// ── Accounts ─────────────────────────────────────────────────────────────────
async function loadAccounts() {
  try {
    const d = await fetch(`/api/workspaces/${wsId}/accounts`).then(r => r.json());
    accounts = d.items || [];
    const sel = document.getElementById('account-sel');
    const compSel = document.getElementById('compose-account');
    sel.innerHTML = accounts.map(a => `<option value="${a.account_id}">${a.display_name}</option>`).join('');
    compSel.innerHTML = accounts.map(a => `<option value="${a.account_id}">${a.display_name}</option>`).join('');
    updatePreviewAccount();
  } catch(e) { console.error('Failed to load accounts', e); }
}

function onAccountChange() {
  renderPosts();
}

// ── Storage ───────────────────────────────────────────────────────────────────
function loadPostsFromStorage() {
  try { posts = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
  catch(e) { posts = []; }
}

function savePostsToStorage() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(posts));
}

// ── Posts CRUD ────────────────────────────────────────────────────────────────
function savePost() {
  const content = document.getElementById('post-content').value.trim();
  if (!content) { showToast('Please write some content first', 'error'); return; }

  const accountId = document.getElementById('compose-account').value;
  const account = accounts.find(a => a.account_id === accountId);
  const scheduledAt = scheduleMode === 'schedule' ? document.getElementById('schedule-datetime').value : null;

  if (scheduleMode === 'schedule' && !scheduledAt) {
    showToast('Please select a date and time', 'error'); return;
  }

  if (editingPostId) {
    const idx = posts.findIndex(p => p.id === editingPostId);
    if (idx >= 0) {
      posts[idx] = { ...posts[idx], content, account_id: accountId, account_name: account?.display_name, status: scheduleMode === 'schedule' ? 'scheduled' : 'draft', scheduled_at: scheduledAt, updated_at: new Date().toISOString() };
    }
  } else {
    posts.unshift({
      id: Date.now().toString(),
      workspace_id: wsId,
      account_id: accountId,
      account_name: account?.display_name || 'Unknown',
      content,
      status: scheduleMode === 'schedule' ? 'scheduled' : 'draft',
      scheduled_at: scheduledAt,
      created_at: new Date().toISOString(),
      updated_at: new Date().toISOString(),
    });
  }

  savePostsToStorage();
  renderPosts();
  updateStats();
  renderCalendar();
  closeCompose();
  showToast(scheduleMode === 'schedule' ? '📅 Post scheduled!' : '💾 Draft saved!', 'success');
}

function deletePost(id, e) {
  e.stopPropagation();
  if (!confirm('Delete this post?')) return;
  posts = posts.filter(p => p.id !== id);
  savePostsToStorage();
  renderPosts();
  updateStats();
  renderCalendar();
  showToast('Deleted', '');
}

function editPost(id, e) {
  e.stopPropagation();
  const post = posts.find(p => p.id === id);
  if (!post) return;
  openCompose(post);
}

function openCompose(post) {
  editingPostId = post?.id || null;
  document.getElementById('compose-title').textContent = post ? 'Edit Post' : 'New Post';
  document.getElementById('post-content').value = post?.content || '';
  document.getElementById('schedule-datetime').value = post?.scheduled_at?.slice(0,16) || '';
  if (post?.account_id) document.getElementById('compose-account').value = post.account_id;
  setScheduleMode(post?.status === 'draft' ? 'draft' : 'schedule');
  onContentInput();
  updatePreviewAccount();
  document.getElementById('compose-panel').style.display = 'flex';
  document.getElementById('post-content').focus();
}

function closeCompose() {
  document.getElementById('compose-panel').style.display = 'none';
  editingPostId = null;
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderPosts() {
  const list = document.getElementById('posts-list');
  let filtered = posts.filter(p => p.workspace_id === wsId);
  if (currentFilter !== 'all') filtered = filtered.filter(p => p.status === currentFilter);
  filtered.sort((a, b) => {
    if (a.scheduled_at && b.scheduled_at) return new Date(a.scheduled_at) - new Date(b.scheduled_at);
    if (a.scheduled_at) return -1; if (b.scheduled_at) return 1;
    return new Date(b.created_at) - new Date(a.created_at);
  });

  if (!filtered.length) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">📝</div><p>No ${currentFilter !== 'all' ? currentFilter : ''} posts yet.</p></div>`;
    return;
  }

  list.innerHTML = filtered.map(p => {
    const initials = (p.account_name || 'U').split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
    const timeStr = p.scheduled_at ? fmtDate(p.scheduled_at) : (p.status === 'published' ? 'Published' : 'Draft');
    const preview = p.content.replace(/\n/g, ' ').slice(0, 120) + (p.content.length > 120 ? '…' : '');
    return `<div class="post-row" onclick="editPost('${p.id}', event)">
      <div class="post-avatar">${initials}</div>
      <div class="post-body">
        <div class="post-account">${esc(p.account_name || '')}</div>
        <div class="post-text">${esc(preview)}</div>
        <div class="post-meta">
          <span class="badge ${p.status}">${statusLabel(p.status)}</span>
          <span class="post-time">${timeStr}</span>
        </div>
      </div>
      <div class="post-actions">
        <button class="post-action-btn" title="Edit" onclick="editPost('${p.id}', event)">✏️</button>
        <button class="post-action-btn danger" title="Delete" onclick="deletePost('${p.id}', event)">🗑</button>
      </div>
    </div>`;
  }).join('');
}

function updateStats() {
  const ws = posts.filter(p => p.workspace_id === wsId);
  document.getElementById('stat-scheduled').textContent = ws.filter(p => p.status === 'scheduled').length;
  document.getElementById('stat-drafts').textContent    = ws.filter(p => p.status === 'draft').length;
  document.getElementById('stat-published').textContent = ws.filter(p => p.status === 'published').length;
}

function renderCalendar() {
  const strip = document.getElementById('calendar-strip');
  const today = new Date();
  const scheduledDates = new Set(
    posts.filter(p => p.status === 'scheduled' && p.scheduled_at).map(p => p.scheduled_at.slice(0, 10))
  );
  const days = [];
  for (let i = 0; i < 14; i++) {
    const d = new Date(today); d.setDate(today.getDate() + i);
    const iso = d.toISOString().slice(0, 10);
    const wd = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];
    const hasPosts = scheduledDates.has(iso);
    days.push(`<div class="cal-day ${hasPosts ? 'has-post' : ''} ${i === 0 ? 'today' : ''}">
      <div class="cal-weekday">${wd}</div>
      <div class="cal-num">${d.getDate()}</div>
      ${hasPosts ? '<div class="cal-dot"></div>' : '<div style="height:8px"></div>'}
    </div>`);
  }
  strip.innerHTML = days.join('');
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderPosts();
}

function setScheduleMode(mode) {
  scheduleMode = mode;
  document.getElementById('toggle-schedule').classList.toggle('active', mode === 'schedule');
  document.getElementById('toggle-draft').classList.toggle('active', mode === 'draft');
  document.getElementById('datetime-field').style.display = mode === 'schedule' ? '' : 'none';
  document.getElementById('save-btn').textContent = mode === 'schedule' ? '📅 Schedule' : '💾 Save Draft';
}

function setDefaultDateTime() {
  const now = new Date(); now.setHours(now.getHours() + 1, 0, 0, 0);
  const iso = now.toISOString().slice(0, 16);
  document.getElementById('schedule-datetime').value = iso;
}

function onContentInput() {
  const ta = document.getElementById('post-content');
  const len = ta.value.length;
  const cc = document.getElementById('char-count');
  cc.textContent = `${len} / 3000`;
  cc.className = 'char-count' + (len > 2800 ? ' warn' : '') + (len > 3000 ? ' over' : '');
  document.getElementById('preview-text').textContent = ta.value || 'Your post will appear here...';
  document.getElementById('preview-text').className = 'li-preview-text' + (ta.value ? '' : ' empty');
}

function updatePreviewAccount() {
  const sel = document.getElementById('compose-account');
  const acc = accounts.find(a => a.account_id === sel?.value);
  if (acc) {
    const initials = acc.display_name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    document.getElementById('preview-avatar').textContent = initials;
    document.getElementById('preview-name').textContent = acc.display_name;
  }
}

document.getElementById('compose-account')?.addEventListener('change', updatePreviewAccount);

// ── AI Assist ─────────────────────────────────────────────────────────────────
async function aiAssist(action) {
  const ta = document.getElementById('post-content');
  const content = ta.value.trim();
  if (!content && action !== 'hooks') { showToast('Write some content first', 'error'); return; }

  const btn = event.target;
  btn.classList.add('loading');
  btn.textContent = '⏳ ' + btn.textContent.slice(2);

  const prompts = {
    improve:  `Improve this LinkedIn post to be more engaging and professional. Keep the language and tone similar. Return ONLY the improved post text:\n\n${content}`,
    shorten:  `Shorten this LinkedIn post significantly while keeping the key message. Return ONLY the shortened text:\n\n${content}`,
    hooks:    `${content ? 'Add a compelling hook as the first line to this LinkedIn post' : 'Write a compelling LinkedIn post hook about thought leadership'}. Return ONLY the post text:\n\n${content}`,
    emojis:   `Add relevant emojis to this LinkedIn post to make it more engaging. Don't overdo it. Return ONLY the post text with emojis:\n\n${content}`,
    cta:      `Add a strong call-to-action at the end of this LinkedIn post. Return ONLY the complete post text with the CTA:\n\n${content}`,
  };

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompts[action] }]
      })
    });
    const d = await res.json();
    const text = d?.content?.[0]?.text || '';
    if (text) {
      ta.value = text;
      onContentInput();
      showToast('✨ Updated!', 'success');
    }
  } catch(e) {
    showToast('AI failed: ' + e.message, 'error');
  } finally {
    btn.classList.remove('loading');
    const labels = { improve: '✨ Improve', shorten: '✂️ Shorten', hooks: '🎯 Add hook', emojis: '😊 Add emojis', cta: '📣 Add CTA' };
    btn.textContent = labels[action];
  }
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function fmtDate(iso) {
  const d = new Date(iso);
  const now = new Date();
  const diff = d - now;
  if (diff > 0 && diff < 86400000) {
    return 'Today ' + d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
  }
  if (diff > 0 && diff < 172800000) {
    return 'Tomorrow ' + d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
  }
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ' ' + d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
}

function statusLabel(s) {
  return { scheduled: '📅 Scheduled', draft: '📝 Draft', published: '✅ Published', failed: '❌ Failed' }[s] || s;
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' ' + type : '');
  setTimeout(() => t.classList.remove('show'), 3000);
}

init();
</script>
