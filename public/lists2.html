<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Lists</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f8f9fa; }
.page-header { background: white; padding: 20px 24px 16px; border-bottom: 1px solid #e5e7eb; }
.page-header h1 { font-size: 18px; font-weight: 600; color: #111827; }
.page-header p { font-size: 13px; color: #6b7280; margin-top: 4px; }
.content { padding: 32px 24px; }
.btn-add-list { display: block; width: 100%; max-width: 480px; padding: 18px; background: #1D9E75; color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: 600; cursor: pointer; transition: background .15s; }
.btn-add-list:hover { background: #178a65; }
.view-toggle { display: flex; gap: 12px; margin-top: 24px; max-width: 480px; }
.view-btn { flex: 1; padding: 14px; border: 2px solid #e5e7eb; border-radius: 10px; background: white; font-size: 15px; font-weight: 500; cursor: pointer; color: #374151; transition: all .15s; }
.view-btn:hover { border-color: #9ca3af; }
.view-btn.active { border-color: #1D9E75; background: #f0fdf4; color: #1D9E75; }
</style>
</head>
<body>
<div class="page-header">
  <h1>&#128203; Lists</h1>
  <p>Manage your contact and company lists</p>
</div>
<div class="content">
  <button class="btn-add-list">+ ADD LIST</button>
  <div class="view-toggle">
    <button class="view-btn active" id="btn-contacts" onclick="selectView('contacts')">&#128101; Contacts</button>
    <button class="view-btn" id="btn-companies" onclick="selectView('companies')">&#127970; Companies</button>
  </div>
</div>
<script>
var params = new URLSearchParams(window.location.search);
var workspaceId = params.get('workspace_id');
var currentView = 'contacts';
function selectView(v) {
  currentView = v;
  document.getElementById('btn-contacts').className = 'view-btn' + (v==='contacts' ? ' active' : '');
  document.getElementById('btn-companies').className = 'view-btn' + (v==='companies' ? ' active' : '');
}
</script>
</body>
</html>
