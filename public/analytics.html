<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analytics</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F5F3F0; color: #1a1a1a; font-size: 13px; }
:root { --green: #52b788; --dark: #1a3a2a; --light-green: #f0f7f4; }

/* Top bar */
.top-bar { background: white; border-bottom: 1px solid #E9E5DF; padding: 12px 20px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; position: sticky; top: 0; z-index: 100; }
.top-bar h1 { font-size: 15px; font-weight: 700; color: var(--dark); margin-right: 4px; }
.filter-select { border: 1px solid #DED9D3; border-radius: 7px; padding: 6px 10px; font-size: 12px; background: #fff; color: #333; cursor: pointer; outline: none; min-width: 140px; }
.filter-select:focus { border-color: var(--green); }
.spacer { flex: 1; }

/* Date range bar */
.date-bar { background: white; border-bottom: 1px solid #E9E5DF; padding: 8px 20px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.range-btn { padding: 5px 14px; border: 1px solid #DED9D3; border-radius: 20px; background: white; font-size: 12px; font-weight: 500; cursor: pointer; color: #555; transition: all .15s; white-space: nowrap; }
.range-btn:hover { border-color: var(--green); color: var(--dark); }
.range-btn.active { background: var(--dark); color: white; border-color: var(--dark); }
.custom-dates { display: none; align-items: center; gap: 6px; }
.custom-dates.show { display: flex; }
.date-input { border: 1px solid #DED9D3; border-radius: 6px; padding: 4px 8px; font-size: 12px; outline: none; }
.date-input:focus { border-color: var(--green); }
.date-label { font-size: 11px; color: #888; font-weight: 600; letter-spacing: .04em; }

/* Content */
.content { padding: 16px 20px 40px; max-width: 1100px; }

/* Follower hero */
.followers-hero { background: var(--dark); color: white; border-radius: 12px; padding: 18px 24px; margin-bottom: 16px; display: flex; align-items: center; gap: 16px; }
.followers-icon { font-size: 28px; opacity: .8; }
.followers-body { flex: 1; }
.followers-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; opacity: .6; margin-bottom: 4px; }
.followers-value { font-size: 36px; font-weight: 800; }
.followers-sub { font-size: 11px; opacity: .5; margin-top: 2px; }

/* Section */
.section { background: white; border: 1px solid #E9E5DF; border-radius: 12px; margin-bottom: 14px; overflow: hidden; }
.section-header { background: #f8f6f3; padding: 12px 18px; border-bottom: 1px solid #E9E5DF; display: flex; align-items: center; gap: 8px; }
.section-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--dark); }
.section-icon { font-size: 15px; }
.section-body { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); padding: 14px 16px; gap: 10px; }

/* Metric card */
.metric { background: #f8f6f3; border: 1px solid #ede9e3; border-radius: 10px; padding: 12px 14px; }
.metric-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: #888; margin-bottom: 6px; }
.metric-value { font-size: 28px; font-weight: 800; color: var(--dark); line-height: 1; }
.metric-pct { font-size: 11px; color: var(--green); font-weight: 600; margin-top: 3px; }
.metric-total { font-size: 10px; color: #aaa; margin-top: 2px; }

/* Loading */
.loading-wrap { text-align: center; padding: 60px; color: #999; }
.spinner { display: inline-block; width: 28px; height: 28px; border: 3px solid #e5e5e5; border-top-color: var(--green); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.empty-state { text-align: center; padding: 60px 20px; color: #aaa; font-size: 14px; }

/* Total badge */
.total-badge { background: var(--light-green); border: 1px solid var(--green); color: var(--dark); font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 12px; margin-left: auto; }
</style>
</head>
<body>

<div class="top-bar">
  <h1>&#128202; Analytics</h1>
  <select class="filter-select" id="campaign-select" onchange="onCampaignChange()">
    <option value="">Select campaign...</option>
  </select>
  <div class="spacer"></div>
  <span id="total-badge" class="total-badge" style="display:none"></span>
</div>

<div class="date-bar">
  <span class="date-label">PERIOD</span>
  <button class="range-btn active" data-range="total" onclick="setRange('total', this)">Total</button>
  <button class="range-btn" data-range="day"   onclick="setRange('day', this)">Today</button>
  <button class="range-btn" data-range="week"  onclick="setRange('week', this)">Last 7 days</button>
  <button class="range-btn" data-range="month" onclick="setRange('month', this)">Last 30 days</button>
  <button class="range-btn" data-range="mtd"   onclick="setRange('mtd', this)">MTD</button>
  <button class="range-btn" data-range="qtd"   onclick="setRange('qtd', this)">QTD</button>
  <button class="range-btn" data-range="custom" onclick="setRange('custom', this)">Custom</button>
  <div class="custom-dates" id="custom-dates">
    <input type="date" class="date-input" id="date-from" onchange="applyCustom()">
    <span style="color:#aaa">—</span>
    <input type="date" class="date-input" id="date-to" onchange="applyCustom()">
  </div>
</div>

<div class="content" id="content">
  <div class="empty-state">&#128202; Select a campaign to view analytics</div>
</div>

<script>
const params   = new URLSearchParams(window.location.search);
const wsId     = params.get('workspace_id');
let allContacts = [];
let rangeMode   = 'total';
let rangeFrom   = null;
let rangeTo     = null;

// ── Date range helpers ────────────────────────────────────────────────────
function getRange(mode) {
  var now   = new Date();
  var today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  var tomorrow = new Date(today); tomorrow.setDate(tomorrow.getDate()+1);

  if (mode === 'total')  return { from: null, to: null };
  if (mode === 'day')    return { from: today, to: tomorrow };
  if (mode === 'week')   { var w=new Date(today); w.setDate(w.getDate()-7); return { from:w, to:tomorrow }; }
  if (mode === 'month')  { var m=new Date(today); m.setDate(m.getDate()-30); return { from:m, to:tomorrow }; }
  if (mode === 'mtd')    return { from: new Date(now.getFullYear(), now.getMonth(), 1), to: tomorrow };
  if (mode === 'qtd')    {
    var q = Math.floor(now.getMonth()/3);
    return { from: new Date(now.getFullYear(), q*3, 1), to: tomorrow };
  }
  if (mode === 'custom') return { from: rangeFrom ? new Date(rangeFrom) : null, to: rangeTo ? new Date(rangeTo+'T23:59:59') : null };
  return { from: null, to: null };
}

function inRange(dateStr, range) {
  if (!range.from && !range.to) return true;
  if (!dateStr) return false;
  var d = new Date(dateStr);
  if (range.from && d < range.from) return false;
  if (range.to   && d >= range.to)  return false;
  return true;
}

function setRange(mode, btn) {
  rangeMode = mode;
  document.querySelectorAll('.range-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  var cd = document.getElementById('custom-dates');
  if (mode === 'custom') { cd.classList.add('show'); return; }
  cd.classList.remove('show');
  if (allContacts.length) render();
}

function applyCustom() {
  rangeFrom = document.getElementById('date-from').value;
  rangeTo   = document.getElementById('date-to').value;
  if (allContacts.length) render();
}

// ── Campaign loading ──────────────────────────────────────────────────────
async function loadCampaigns() {
  var d = await fetch('/api/campaigns?workspace_id='+wsId).then(function(r){return r.json();});
  var sel = document.getElementById('campaign-select');
  (d.items||[]).forEach(function(c) {
    sel.innerHTML += '<option value="'+c.id+'">'+c.name+'</option>';
  });
}

function onCampaignChange() {
  var campId = document.getElementById('campaign-select').value;
  if (!campId) {
    document.getElementById('content').innerHTML = '<div class="empty-state">&#128202; Select a campaign to view analytics</div>';
    document.getElementById('total-badge').style.display='none';
    return;
  }
  loadData(campId);
}

async function loadData(campId) {
  document.getElementById('content').innerHTML = '<div class="loading-wrap"><div class="spinner"></div><p style="margin-top:12px">Loading contacts…</p></div>';
  var d = await fetch('/api/contacts?workspace_id='+wsId+'&campaign_id='+campId+'&limit=5000').then(function(r){return r.json();});
  allContacts = d.items || [];
  render();
}

// ── Render ────────────────────────────────────────────────────────────────
function render() {
  var range = getRange(rangeMode);
  var c = allContacts;
  var total = c.length;

  document.getElementById('total-badge').style.display = '';
  document.getElementById('total-badge').textContent = total.toLocaleString() + ' contacts total';

  // Helper: count contacts where a timestamp is in range
  function cnt(field) {
    return range.from || range.to
      ? c.filter(function(x){ return inRange(x[field], range); }).length
      : c.filter(function(x){ return x[field]; }).length;
  }

  // For boolean fields in total mode
  function cntBool(field) {
    return c.filter(function(x){ return x[field]; }).length;
  }

  // For numeric sum fields, filter by a companion timestamp
  function sum(field, tsField) {
    if (range.from || range.to) {
      // sum only for contacts where tsField is in range
      return c.filter(function(x){ return inRange(x[tsField], range); })
               .reduce(function(a,x){ return a+(x[field]||0); }, 0);
    }
    return c.reduce(function(a,x){ return a+(x[field]||0); }, 0);
  }

  function pct(n, d) {
    if (!d) return '';
    return ' (' + (n/d*100).toFixed(0) + '%)';
  }

  // ── Metrics ──
  var invSent     = cnt('invite_sent_at');
  var invApproved = cnt('invite_approved_at');
  var msgSent     = cnt('msg_sent_at');
  var replied     = cnt('msg_replied_at');
  var positive    = cnt('positive_reply_at');

  var profileViews    = cnt('last_profile_view_at');
  var postLikes       = sum('post_likes_sent',    'likes_sent_at');
  var commentLikes    = sum('comment_likes_sent', 'likes_sent_at');
  var followInvite    = cnt('company_follow_invited_at');
  var followConfirm   = cnt('company_follow_confirmed_at');

  var coLikes         = sum('company_post_likes_sent',    'company_likes_sent_at')
                      + sum('company_comment_likes_sent', 'company_likes_sent_at');
  
  // Company followers = total confirmed (not date-filtered since it's a running total)
  var followers = cntBool('company_follow_confirmed');

  var content = document.getElementById('content');

  function metricCard(label, value, denominator, hint) {
    var p = denominator > 0 ? '<div class="metric-pct">'+(value/denominator*100).toFixed(0)+'% of '+(hint||'total')+'</div>' : '';
    return '<div class="metric"><div class="metric-label">'+label+'</div><div class="metric-value">'+value.toLocaleString()+'</div>'+p+'</div>';
  }

  content.innerHTML = '' +
    // Followers hero
    '<div class="followers-hero">' +
      '<div class="followers-icon">&#127968;</div>' +
      '<div class="followers-body">' +
        '<div class="followers-label">Company Page Followers</div>' +
        '<div class="followers-value">'+followers.toLocaleString()+'</div>' +
        '<div class="followers-sub">Contacts who follow the company page</div>' +
      '</div>' +
    '</div>' +

    // Outbound
    '<div class="section">' +
      '<div class="section-header"><span class="section-icon">&#128228;</span><span class="section-title">Outbound</span></div>' +
      '<div class="section-body">' +
        metricCard('Invitations Sent',     invSent,     total,       'contacts') +
        metricCard('Invitations Approved', invApproved, invSent,     'sent') +
        metricCard('Messages Sent',        msgSent,     invApproved, 'connected') +
        metricCard('Replies',              replied,     msgSent,     'sent') +
        metricCard('Positive Replies',     positive,    replied,     'replies') +
      '</div>' +
    '</div>' +

    // Engagement Activities
    '<div class="section">' +
      '<div class="section-header"><span class="section-icon">&#128293;</span><span class="section-title">Engagement Activities</span></div>' +
      '<div class="section-body">' +
        metricCard('Profile Views',             profileViews, total, 'contacts') +
        metricCard('Post Likes',                postLikes,    0, '') +
        metricCard('Comment Likes',             commentLikes, 0, '') +
        metricCard('Company Follow Invited',    followInvite,   invApproved||total, 'connected') +
        metricCard('Company Follow Confirmed',  followConfirm,  followInvite, 'invited') +
      '</div>' +
    '</div>' +

    // Company Engagement Activities
    '<div class="section">' +
      '<div class="section-header"><span class="section-icon">&#127968;</span><span class="section-title">Company Engagement Activities</span></div>' +
      '<div class="section-body">' +
        '<div class="metric"><div class="metric-label">Co. Post + Comment Likes</div><div class="metric-value">'+coLikes.toLocaleString()+'</div><div class="metric-total">Likes sent from company page</div></div>' +
        metricCard('Co. Post Likes',    sum('company_post_likes_sent',    'company_likes_sent_at'), 0, '') +
        metricCard('Co. Comment Likes', sum('company_comment_likes_sent', 'company_likes_sent_at'), 0, '') +
      '</div>' +
    '</div>';
}

// Init
loadCampaigns();
</script>
</body>
</html>
