<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; font-size: 14px; }
.page { padding: 28px; max-width: 1020px; }
.page-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 28px; }
.page-title { font-size: 22px; font-weight: 600; }
.page-sub { font-size: 14px; color: #666; margin-top: 4px; }
.add-btn { background: #1D9E75; border: none; border-radius: 8px; padding: 9px 18px; font-size: 14px; font-weight: 500; color: white; cursor: pointer; }
.add-btn:hover { background: #178f68; }
.count { font-size: 12px; color: #aaa; margin-bottom: 8px; }

.accounts-rail { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; margin-bottom: 24px; }
.account-tile { background: white; border: 1px solid #e5e5e5; border-radius: 12px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: border-color 0.15s; }
.account-tile:hover { border-color: #b0ddd0; }
.account-tile.active { border: 1.5px solid #1D9E75; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: #1D9E75; flex-shrink: 0; }
.account-avatar { width: 40px; height: 40px; border-radius: 50%; background: #DBEAFE; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; color: #1E40AF; flex-shrink: 0; }
.account-name { font-size: 14px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.tile-disconnect { margin-left: auto; background: none; border: none; color: #ddd; font-size: 18px; cursor: pointer; padding: 2px 4px; flex-shrink: 0; }
.tile-disconnect:hover { color: #DC2626; }

.empty-accounts { background: white; border: 1px dashed #e0e0e0; border-radius: 12px; padding: 40px 24px; text-align: center; color: #aaa; font-size: 14px; }
.divider { height: 1px; background: #e5e5e5; margin-bottom: 24px; }

.account-detail { background: white; border: 1px solid #e5e5e5; border-radius: 12px; overflow: hidden; }
.detail-head { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid #f0f0f0; background: #fafafa; }
.detail-head-left { display: flex; align-items: center; gap: 12px; }
.detail-name { font-size: 16px; font-weight: 500; }
.detail-body { padding: 20px; display: flex; flex-direction: column; gap: 24px; }
.section-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #aaa; margin-bottom: 12px; }

/* Copy settings banner */
.copy-banner { display: flex; align-items: center; gap: 12px; background: #F0FBF7; border: 1px solid #b0ddd0; border-radius: 10px; padding: 12px 16px; }
.copy-banner-label { font-size: 13px; color: #1a5c45; font-weight: 500; white-space: nowrap; }
.copy-select { flex: 1; padding: 7px 10px; border: 1px solid #b0ddd0; border-radius: 8px; font-size: 13px; background: white; font-family: inherit; cursor: pointer; color: #333; }
.copy-select:focus { outline: none; border-color: #1D9E75; }
.copy-btn { background: #1D9E75; border: none; border-radius: 8px; padding: 7px 14px; font-size: 13px; font-weight: 500; color: white; cursor: pointer; white-space: nowrap; }
.copy-btn:hover { background: #178f68; }

.limits-grid { display: flex; flex-direction: column; gap: 12px; }
.limit-row { display: grid; grid-template-columns: 170px 1fr 36px; align-items: center; gap: 12px; }
.limit-name { font-size: 13px; color: #555; }
.limit-val { font-size: 13px; font-weight: 500; text-align: right; }
.days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
.day-card { border: 1px solid #e5e5e5; border-radius: 8px; padding: 10px 8px; display: flex; flex-direction: column; gap: 8px; }
.day-card.off { opacity: 0.4; }
.day-head { display: flex; align-items: center; justify-content: space-between; }
.day-name { font-size: 11px; font-weight: 500; color: #555; }
.day-toggle { width: 28px; height: 16px; border-radius: 8px; background: #ddd; border: none; cursor: pointer; position: relative; transition: background 0.15s; }
.day-toggle.on { background: #1D9E75; }
.day-toggle::after { content: ''; position: absolute; width: 12px; height: 12px; border-radius: 50%; background: white; top: 2px; left: 2px; transition: left 0.15s; }
.day-toggle.on::after { left: 14px; }
.time-inputs { display: flex; flex-direction: column; gap: 4px; }
.time-row { display: flex; align-items: center; gap: 4px; }
.time-label { font-size: 10px; color: #aaa; width: 20px; }
.time-input { flex: 1; font-size: 11px; border: 1px solid #e0e0e0; border-radius: 4px; padding: 3px 4px; background: #fafafa; }
.day-off-label { font-size: 11px; color: #aaa; text-align: center; }
.save-row { display: flex; justify-content: flex-end; padding-top: 8px; border-top: 1px solid #f0f0f0; }
.save-btn { background: #1D9E75; border: none; border-radius: 8px; padding: 8px 20px; font-size: 14px; font-weight: 500; color: white; cursor: pointer; }
.save-btn:hover { background: #178f68; }
.ghost-btn { background: white; border: 1px solid #e0e0e0; border-radius: 8px; padding: 6px 12px; font-size: 13px; color: #555; cursor: pointer; }
.ghost-btn:hover { background: #f5f5f5; }
.no-selection { border: 1px solid #e5e5e5; border-radius: 12px; padding: 48px 24px; text-align: center; color: #aaa; font-size: 14px; }

/* Modal */
.modal-backdrop { position: fixed; inset: 0; z-index: 50; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; padding: 20px; }
.modal { background: white; border-radius: 14px; width: min(500px, 100%); padding: 28px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
.modal h3 { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
.modal-sub { font-size: 13px; color: #888; margin-bottom: 20px; }
.accounts-list { display: flex; flex-direction: column; gap: 8px; max-height: 320px; overflow-y: auto; margin-bottom: 20px; }
.selectable-account { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border: 1.5px solid #e5e5e5; border-radius: 10px; cursor: pointer; transition: border-color 0.15s, background 0.15s; }
.selectable-account:hover { border-color: #1D9E75; background: #F0FBF7; }
.selectable-account.selected { border-color: #1D9E75; background: #F0FBF7; }
.selectable-account.already-added { opacity: 0.5; cursor: default; }
.selectable-account.already-added:hover { border-color: #e5e5e5; background: white; }
.sel-avatar { width: 36px; height: 36px; border-radius: 50%; background: #DBEAFE; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: #1E40AF; flex-shrink: 0; }
.sel-name { font-size: 14px; font-weight: 500; }
.sel-badge { margin-left: auto; font-size: 11px; background: #f0f0f0; color: #888; border-radius: 999px; padding: 2px 8px; flex-shrink: 0; }
.modal-actions { display: flex; justify-content: flex-end; gap: 10px; }
.primary-btn { background: #1D9E75; border: none; border-radius: 8px; padding: 9px 20px; font-size: 14px; font-weight: 500; color: white; cursor: pointer; }
.primary-btn:hover { background: #178f68; }
.primary-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.loading { color: #888; font-size: 13px; padding: 20px 0; text-align: center; }
.error-banner { background: #FEF2F2; border: 1px solid #FECACA; border-radius: 8px; padding: 10px 14px; color: #DC2626; font-size: 13px; margin-bottom: 16px; }
</style>
</head>
<body>
<div class="page">
  <div class="page-header">
    <div>
      <div class="page-title">Settings</div>
      <div class="page-sub">Manage LinkedIn accounts connected to this workspace</div>
    </div>
    <button class="add-btn" onclick="openAddModal()">+ Add account</button>
  </div>
  <div id="error-area"></div>
  <div id="account-count" class="count"></div>
  <div id="accounts-rail" class="accounts-rail"></div>
  <div class="divider"></div>
  <div id="detail-area"></div>
</div>

<!-- Add account modal -->
<div id="add-modal" class="modal-backdrop" style="display:none;">
  <div class="modal">
    <h3>Add account</h3>
    <p class="modal-sub">Select a LinkedIn account from your Unipile connection to add to this workspace.</p>
    <div id="modal-error" style="display:none;" class="error-banner"></div>
    <div id="accounts-list" class="accounts-list"><div class="loading">Loading available accounts...</div></div>
    <div class="modal-actions">
      <button class="ghost-btn" onclick="closeAddModal()">Cancel</button>
      <button class="primary-btn" id="confirm-add-btn" onclick="confirmAdd()" disabled>Add account</button>
    </div>
  </div>
</div>

<script>
const LIMITS = [
  { key:'connection_requests', label:'Connection requests', max:75, default:20 },
  { key:'messages',            label:'Messages',            max:100, default:30 },
  { key:'inmails',             label:'InMails',             max:25,  default:8  },
  { key:'profile_views',       label:'Profile views',       max:200, default:50 },
  { key:'likes',               label:'Post likes',          max:50,  default:15 },
  { key:'followings',          label:'Follows',             max:50,  default:15 },
  { key:'company_follow_invites', label:'Company follow invites', max:50, default:10 },
];
const DAYS = [
  {key:'1',label:'Mon'},{key:'2',label:'Tue'},{key:'3',label:'Wed'},
  {key:'4',label:'Thu'},{key:'5',label:'Fri'},{key:'6',label:'Sat'},{key:'7',label:'Sun'}
];

const urlParams = new URLSearchParams(window.location.search);
const workspaceId = urlParams.get('workspace_id');

// In-memory settings store: { [accountId]: { limits: {}, hours: {} } }
const settingsStore = {};

let connectedAccounts = [];
let allUnipileAccounts = [];
let activeAccountId = null;
let selectedToAdd = null;

function initials(n) {
  return String(n||'?').split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase();
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Load ──────────────────────────────────────────────────────────────────────
async function load() {
  try {
    const res = await fetch(`/api/workspaces/${workspaceId}/accounts`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    connectedAccounts = Array.isArray(data.items) ? data.items : [];
    if (!activeAccountId && connectedAccounts.length) {
      activeAccountId = connectedAccounts[0].account_id;
    }
  } catch(err) {
    showError('Could not load accounts: ' + err.message);
  }
  renderRail();
  renderDetail();
}

function showError(msg) {
  const el = document.getElementById('error-area');
  el.innerHTML = msg ? `<div class="error-banner">${esc(msg)}</div>` : '';
}

// ── Rail ──────────────────────────────────────────────────────────────────────
function renderRail() {
  const count = connectedAccounts.length;
  document.getElementById('account-count').textContent =
    count ? `${count} account${count!==1?'s':''} connected to this workspace` : '';

  const rail = document.getElementById('accounts-rail');
  if (!count) {
    rail.innerHTML = `<div class="empty-accounts" style="grid-column:1/-1;">
      No accounts connected yet.<br>Click <strong>+ Add account</strong> to get started.
    </div>`;
    return;
  }

  rail.innerHTML = connectedAccounts.map(acc => {
    const isActive = acc.account_id === activeAccountId;
    // Show only display_name — no account ID visible
    return `
      <div class="account-tile${isActive?' active':''}" onclick="selectAccount('${acc.account_id}')">
        <div class="status-dot"></div>
        <div class="account-avatar">${initials(acc.display_name)}</div>
        <div style="flex:1;min-width:0;">
          <div class="account-name">${esc(acc.display_name)}</div>
        </div>
        <button class="tile-disconnect" onclick="event.stopPropagation();disconnectAccount('${acc.account_id}')" title="Disconnect">&times;</button>
      </div>`;
  }).join('');
}

function selectAccount(id) {
  activeAccountId = id;
  renderRail();
  renderDetail();
}

async function disconnectAccount(accountId) {
  if (!confirm('Disconnect this account from the workspace?')) return;
  try {
    await fetch(`/api/workspaces/${workspaceId}/accounts/${accountId}`, { method: 'DELETE' });
    if (activeAccountId === accountId) activeAccountId = connectedAccounts.find(a => a.account_id !== accountId)?.account_id || null;
    await load();
  } catch(err) {
    showError('Failed to disconnect: ' + err.message);
  }
}

// ── Detail ────────────────────────────────────────────────────────────────────
function renderDetail() {
  const area = document.getElementById('detail-area');
  const acc = connectedAccounts.find(a => a.account_id === activeAccountId);

  if (!connectedAccounts.length) { area.innerHTML = ''; return; }
  if (!acc) {
    area.innerHTML = '<div class="no-selection">Select an account above to configure its settings</div>';
    return;
  }

  // Ensure settings entry exists
  if (!settingsStore[acc.account_id]) {
    settingsStore[acc.account_id] = {
      limits: Object.fromEntries(LIMITS.map(l => [l.key, l.default])),
      hours: Object.fromEntries(DAYS.map((d,i) => [d.key, { on: i < 5, from: '09:00', to: '18:00' }]))
    };
  }

  const cfg = settingsStore[acc.account_id];

  // Other accounts (for copy settings)
  const others = connectedAccounts.filter(a => a.account_id !== acc.account_id);
  const copyBannerHtml = others.length > 0 ? `
    <div class="copy-banner">
      <span class="copy-banner-label">Copy settings from</span>
      <select class="copy-select" id="copy-select-${acc.account_id}">
        <option value="">Select an account...</option>
        ${others.map(o => `<option value="${o.account_id}">${esc(o.display_name)}</option>`).join('')}
      </select>
      <button class="copy-btn" onclick="copySettingsFrom('${acc.account_id}')">Copy</button>
    </div>` : '';

  const limitsHtml = LIMITS.map(l => `
    <div class="limit-row">
      <div class="limit-name">${l.label}</div>
      <input type="range" min="0" max="${l.max}" step="1"
        value="${cfg.limits[l.key]}"
        id="limit-${acc.account_id}-${l.key}"
        oninput="updateLimit('${acc.account_id}','${l.key}',this.value)">
      <div class="limit-val" id="lv-${acc.account_id}-${l.key}">${cfg.limits[l.key]}</div>
    </div>`).join('');

  const daysHtml = DAYS.map(d => {
    const h = cfg.hours[d.key];
    return `
    <div class="day-card${h.on?'':' off'}" id="dc-${acc.account_id}-${d.key}">
      <div class="day-head">
        <span class="day-name">${d.label}</span>
        <button class="day-toggle${h.on?' on':''}" id="dt-${acc.account_id}-${d.key}" onclick="toggleDay('${acc.account_id}','${d.key}')"></button>
      </div>
      <div id="dts-${acc.account_id}-${d.key}" style="display:${h.on?'':'none'}">
        <div class="time-inputs">
          <div class="time-row"><span class="time-label">from</span><input class="time-input" type="time" value="${h.from}" onchange="updateHour('${acc.account_id}','${d.key}','from',this.value)"></div>
          <div class="time-row"><span class="time-label">to</span><input class="time-input" type="time" value="${h.to}" onchange="updateHour('${acc.account_id}','${d.key}','to',this.value)"></div>
        </div>
      </div>
      <div id="dof-${acc.account_id}-${d.key}" class="day-off-label" style="display:${h.on?'none':''}">off</div>
    </div>`; }).join('');

  area.innerHTML = `
    <div class="account-detail">
      <div class="detail-head">
        <div class="detail-head-left">
          <div class="account-avatar">${initials(acc.display_name)}</div>
          <div><div class="detail-name">${esc(acc.display_name)}</div></div>
        </div>
        <button class="ghost-btn" style="color:#DC2626;border-color:#FECACA;" onclick="disconnectAccount('${acc.account_id}')">Disconnect</button>
      </div>
      <div class="detail-body">
        ${copyBannerHtml}
        <div>
          <div class="section-label">Daily action limits</div>
          <div class="limits-grid">${limitsHtml}</div>
        </div>
        <div>
          <div class="section-label">Working hours</div>
          <div class="days-grid">${daysHtml}</div>
        </div>
        <div class="save-row">
          <button class="save-btn" onclick="saveSettings('${acc.account_id}')">Save settings</button>
        </div>
      </div>
    </div>`;
}

// ── Settings helpers ──────────────────────────────────────────────────────────
function updateLimit(accountId, key, value) {
  if (!settingsStore[accountId]) return;
  settingsStore[accountId].limits[key] = parseInt(value);
  const el = document.getElementById(`lv-${accountId}-${key}`);
  if (el) el.textContent = value;
}

function updateHour(accountId, dayKey, field, value) {
  if (!settingsStore[accountId]) return;
  settingsStore[accountId].hours[dayKey][field] = value;
}

function toggleDay(accountId, dayKey) {
  if (!settingsStore[accountId]) return;
  const h = settingsStore[accountId].hours[dayKey];
  h.on = !h.on;
  const toggle = document.getElementById(`dt-${accountId}-${dayKey}`);
  const card   = document.getElementById(`dc-${accountId}-${dayKey}`);
  const times  = document.getElementById(`dts-${accountId}-${dayKey}`);
  const off    = document.getElementById(`dof-${accountId}-${dayKey}`);
  if (toggle) toggle.classList.toggle('on', h.on);
  if (card)   card.classList.toggle('off', !h.on);
  if (times)  times.style.display = h.on ? '' : 'none';
  if (off)    off.style.display   = h.on ? 'none' : '';
}

function copySettingsFrom(targetAccountId) {
  const select = document.getElementById(`copy-select-${targetAccountId}`);
  const sourceId = select?.value;
  if (!sourceId) return;

  const source = settingsStore[sourceId];
  if (!source) return;

  // Deep copy
  settingsStore[targetAccountId] = {
    limits: { ...source.limits },
    hours:  Object.fromEntries(Object.entries(source.hours).map(([k,v]) => [k, {...v}]))
  };

  // Re-render detail to reflect copied values
  renderDetail();

  // Visual feedback
  const btn = document.querySelector(`#copy-select-${targetAccountId}`)?.closest('.copy-banner')?.querySelector('.copy-btn');
  if (btn) {
    const orig = btn.textContent;
    btn.textContent = 'Copied!';
    btn.style.background = '#178f68';
    setTimeout(() => { btn.textContent = orig; btn.style.background = ''; }, 1500);
  }
}

function saveSettings(accountId) {
  // TODO: persist to DB
  alert('Settings saved for ' + (connectedAccounts.find(a=>a.account_id===accountId)?.display_name || accountId));
}

// ── Add account modal ─────────────────────────────────────────────────────────
async function openAddModal() {
  selectedToAdd = null;
  document.getElementById('confirm-add-btn').disabled = true;
  document.getElementById('modal-error').style.display = 'none';
  document.getElementById('accounts-list').innerHTML = '<div class="loading">Loading available accounts...</div>';
  document.getElementById('add-modal').style.display = 'flex';

  try {
    const res = await fetch('/api/unipile/accounts');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    allUnipileAccounts = Array.isArray(data.items) ? data.items : [];
    renderAccountsList();
  } catch(err) {
    document.getElementById('accounts-list').innerHTML = '';
    const errEl = document.getElementById('modal-error');
    errEl.textContent = 'Could not load Unipile accounts: ' + err.message;
    errEl.style.display = 'block';
  }
}

function closeAddModal() {
  document.getElementById('add-modal').style.display = 'none';
  selectedToAdd = null;
}

function renderAccountsList() {
  const connectedIds = new Set(connectedAccounts.map(a => a.account_id));
  const list = document.getElementById('accounts-list');

  if (!allUnipileAccounts.length) {
    list.innerHTML = '<div class="loading">No LinkedIn accounts found in Unipile.</div>';
    return;
  }

  list.innerHTML = allUnipileAccounts.map(acc => {
    // Show only the name — no ID
    const name = acc.name || acc.username || acc.public_identifier || 'Account';
    const alreadyAdded = connectedIds.has(acc.id);
    const isSelected = selectedToAdd === acc.id;
    return `
      <div class="selectable-account${isSelected?' selected':''}${alreadyAdded?' already-added':''}"
        onclick="${alreadyAdded ? '' : `selectToAdd('${acc.id}')`}">
        <div class="sel-avatar">${initials(name)}</div>
        <div>
          <div class="sel-name">${esc(name)}</div>
        </div>
        ${alreadyAdded ? '<span class="sel-badge">Already added</span>' : ''}
      </div>`;
  }).join('');
}

function selectToAdd(accountId) {
  selectedToAdd = accountId;
  document.getElementById('confirm-add-btn').disabled = false;
  renderAccountsList();
}

async function confirmAdd() {
  if (!selectedToAdd) return;
  const acc = allUnipileAccounts.find(a => a.id === selectedToAdd);
  if (!acc) return;

  const btn = document.getElementById('confirm-add-btn');
  btn.disabled = true;
  btn.textContent = 'Adding...';

  try {
    const name = acc.name || acc.username || acc.public_identifier || acc.id;
    const res = await fetch(`/api/workspaces/${workspaceId}/accounts`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        account_id: acc.id,
        display_name: name,
        provider: 'linkedin',
        status: acc.connection_state || acc.status || 'connected'
      })
    });
    if (!res.ok) throw new Error((await res.json()).error);
    closeAddModal();
    activeAccountId = acc.id;
    await load();
  } catch(err) {
    const errEl = document.getElementById('modal-error');
    errEl.textContent = err.message;
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Add account';
  }
}

load();
</script>
</body>
</html>
