<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campaigns</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; font-size: 14px; }
.page { padding: 28px; max-width: 1060px; }
.page-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 28px; }
.page-title { font-size: 22px; font-weight: 600; }
.page-sub { font-size: 14px; color: #666; margin-top: 4px; }

.campaigns-table { width: 100%; border-collapse: collapse; }
.campaigns-table th { text-align: left; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: #888; padding: 12px 16px; border-bottom: 1px solid #f0f0f0; background: #fafafa; }

.status-active { background: #E1F5EE; color: #0F6E56; }
.status-paused { background: #FFF3E0; color: #E65100; }

.action-btn { background: white; border: 1px solid #e5e5e5; border-radius: 6px; padding: 5px 10px; font-size: 12px; color: #666; cursor: pointer; }
.action-btn:hover { background: #f5f5f5; }

.analytics-hint { font-size: 11px; color: #aaa; margin-top: 3px; }
.empty-state { background: white; border: 1px dashed #e0e0e0; border-radius: 12px; padding: 64px 24px; text-align: center; }

.modal-steps { display: flex; border-bottom: 1px solid #f0f0f0; flex-shrink: 0; }

.modal-step.active { color: #1D9E75; background: #F0FBF7; }

.modal-body { padding: 26px 24px; overflow-y: auto; flex: 1; }
.modal-footer { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; border-top: 1px solid #f0f0f0; background: #fafafa; flex-shrink: 0; }
.section-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #aaa; margin-bottom: 16px; }

</style>
</head>
<body>
<div class="page">
  <div class="page-header">
    <div>
      <div class="page-title">Campaigns</div>
      <div class="page-sub">Manage your outreach campaigns</div>
    </div>
    <button class="new-btn" onclick="openModal()">+ New campaign</button>
  </div>
  <div id="campaigns-area"></div>
</div>

<div id="modal" class="modal-backdrop" style="display:none;">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title">New campaign</div>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-steps" id="modal-steps"></div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer">
      <button class="ghost-btn" id="btn-back" onclick="prevStep()">Back</button>
      <button class="primary-btn" id="btn-next" onclick="nextStep()">Continue</button>
    </div>
  </div>
</div>

<div id="msg-dialog" class="msg-dialog-backdrop" style="display:none;">
  <div class="msg-dialog">
    <h3 id="msg-dialog-title">Add message</h3>
    <div class="field-label">Wait before sending</div>
    <div class="delay-row">
      <input type="number" id="msg-delay-val" value="3" min="1">
      <select id="msg-delay-unit"><option value="hours">hours</option><option value="days" selected>days</option><option value="weeks">weeks</option></select>
      <span style="font-size:13px;color:#888;">after previous step</span>
    </div>
    <div class="ab-info-box">&#9654; The system randomly sends one variant per contact. After enough sends, compare reply rates to find the winner.</div>
    <div id="variant-sections"></div>
    <div id="add-variant-area"></div>
    <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:16px;">
      <button class="ghost-btn" onclick="closeMsgDialog()">Cancel</button>
      <button class="primary-btn" onclick="saveMsgDialog()">Add message</button>
    </div>
  </div>
</div>

<div id="cm-back" class="cm-back" style="display:none;" onclick="if(event.target===this)closeCM()">
  <div class="cm-modal">
    <div class="cm-head">
      <div>
        <div class="cm-name" id="cm-name">Loading...</div>
        <div class="cm-meta" id="cm-meta"></div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <button id="cm-st-btn" class="ghost-btn" style="font-size:12px;" onclick="toggleCMStatus()"></button>
        <button class="modal-close" onclick="closeCM()">&times;</button>
      </div>
    </div>
    <div class="cm-nav">
      <button class="cm-tab" data-tab="analytics" onclick="switchCMTab('analytics')">&#128200; Analytics</button>
      <button class="cm-tab" data-tab="companies" onclick="switchCMTab('companies')">&#127970; Companies</button>
      <button class="cm-tab" data-tab="audience"  onclick="switchCMTab('audience')">&#128100; Audience</button>
      <button class="cm-tab" data-tab="settings"  onclick="switchCMTab('settings')">&#9881;&#65039; Settings</button>
    </div>
    <div id="cmb-analytics" class="cm-body"></div>
    <div id="cmb-companies" class="cm-body" style="display:none;"></div>
    <div id="cmb-audience"  class="cm-body" style="display:none;"></div>
    <div id="cmb-settings"  class="cm-body" style="display:none;"></div>
    <div id="cm-foot" class="cm-foot" style="display:none;">
      <button class="ghost-btn" onclick="closeCM()">Close</button>
      <button class="primary-btn" id="cm-save-btn" onclick="saveCMSettings()">Save settings</button>
    </div>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const workspaceId = params.get('workspace_id');
const settingsUrl = `settings.html?workspace_id=${workspaceId}`;

const STEPS = ['Account','List','Sequence','Name & Hours'];
const DAYS  = [
  {key:'1',label:'Mon'},{key:'2',label:'Tue'},{key:'3',label:'Wed'},
  {key:'4',label:'Thu'},{key:'5',label:'Fri'},{key:'6',label:'Sat'},{key:'7',label:'Sun'}
];
const ENGAGEMENT_ACTIONS = [
  { key: 'view_profile',          label: 'View profile',                    sub: 'Once per week' },
  { key: 'follow_company',        label: 'Invite to follow company page',   sub: 'Uses company page from Settings' },
  { key: 'like_posts',            label: 'Like posts (personal)',           sub: 'Posts from last 7 days' },
  { key: 'like_comments',         label: 'Like comments (personal)',        sub: '' },
  { key: 'company_like_posts',    label: 'Like posts via company page',     sub: 'Posts from last 7 days' },
  { key: 'company_like_comments', label: 'Like comments via company page',  sub: '' },
];

function defaultHours() {
  return Object.fromEntries(DAYS.map((d, i) => [d.key, { on: i < 5, from: '09:00', to: '18:00' }]));
}

let campaigns = [], workspaceAccounts = [], currentStep = 0;
let wizard = resetWizard(), activeMsgCanvas = null, dlgVariants = [];

var msgEditCanvas = null;
var CKEY = { new:'new', existingNo:'existing_no_history', existingYes:'existing_with_history' };
var cmId=null, cmData=null, cmTab=null, cmLoaded={}, cmSettings=null, cmCtPage=1;

function resetWizard() {
  return {
    selectedAccount: null,
    list_id: null, list_name: null, list_type: null,
    audienceType: null,
    urlsPasted: '', companyUrls: '', searchTitles: '', maxPerCompany: 10,
    searchStatus: null, contacts: [], companiesMeta: [],
    allCompanyUrls: [], isPreview: false, totalCompanies: 0,
    keywordsQuery: '', nextCursor: null,
    selectedContactIndices: new Set(),
    targetCountry: '',
    connectionEnabled: true, withdrawEnabled: false, withdrawDays: 14, resendEnabled: false,
    newMessages: [], existingNoHistoryMessages: [], existingWithHistoryMessages: [],
    engagement: {}, campaignName: '', hours: defaultHours()
  };
}

function initials(n) { return String(n||'?').split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase(); }
function pct(a, b) { const bn = parseInt(b) || 0; return bn > 0 ? Math.round((parseInt(a)||0) / bn * 100) + '%' : '\u2014'; }
function countUrls(t){ return (t.match(/linkedin\.com\/in\//g)||[]).length; }
function esc(s)      { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function safeUrl(u)  { u=(u||'').trim(); return /^https?:\/\//i.test(u)?u:'https://'+u; }

async function load() {
  try {
    const [campRes, accRes] = await Promise.all([
      fetch(`/api/campaigns?workspace_id=${workspaceId}`),
      fetch(`/api/workspaces/${workspaceId}/accounts`)
    ]);
    const campData = await campRes.json(), accData = await accRes.json();
    campaigns         = Array.isArray(campData.items) ? campData.items : [];
    workspaceAccounts = Array.isArray(accData.items)  ? accData.items  : [];
  } catch(e) { console.error(e); }
  renderCampaigns();
}

function renderCampaigns() {
  const el = document.getElementById('campaigns-area');
  if (!campaigns.length) {
    el.innerHTML = `<div class="empty-state"><div style="font-size:32px;margin-bottom:12px;opacity:0.3;">&#128203;</div><div style="font-size:16px;font-weight:500;margin-bottom:6px;">No campaigns yet</div><div style="font-size:13px;color:#888;">Create your first campaign to start outreach</div></div>`;
    return;
  }
  el.innerHTML = `<div class="campaigns-table-wrap"><table class="campaigns-table">
    <thead><tr><th>Campaign</th><th>Account</th><th>Invites sent</th><th>Approved</th><th>Messages</th><th>Positive replies</th><th>Status</th><th></th></tr></thead>
    <tbody>${campaigns.map(c=>`<tr onclick="openCampaignModal(${c.id})">
      <td><strong>${esc(c.name)}</strong><div class="analytics-hint">&#9998; Click to view &amp; edit</div></td>
      <td style="color:#888;">${esc(c.account_id||'\u2014')}</td>
      <td><div class="stat-num">${parseInt(c.invites_sent)||0}</div></td>
      <td><div class="stat-num">${parseInt(c.invites_approved)||0}</div><div class="stat-rate">${pct(c.invites_approved,c.invites_sent)}</div></td>
      <td><div class="stat-num">${parseInt(c.messages_sent)||0}</div></td>
      <td><div class="stat-num">${parseInt(c.positive_replies)||0}</div><div class="stat-rate">${pct(c.positive_replies,c.messages_sent)}</div></td>
      <td><span class="status-pill status-${esc(c.status)}">${esc(c.status)}</span></td>
      <td onclick="event.stopPropagation()"><button class="action-btn danger" onclick="deleteCampaign(${c.id})">Delete</button></td>
    </tr>`).join('')}</tbody>
  </table></div>`;
}

async function deleteCampaign(id) {
  if (!confirm('Delete this campaign?')) return;
  await fetch(`/api/campaigns/${id}?workspace_id=${workspaceId}`, { method: 'DELETE' });
  await load();
}

function openModal()  { wizard = resetWizard(); currentStep = 0; document.getElementById('modal').style.display='flex'; renderStep(); }
function closeModal() { document.getElementById('modal').style.display='none'; }
function renderStep() {
  document.getElementById('modal-steps').innerHTML = STEPS.map((s,i)=>`<div class="modal-step ${i===currentStep?'active':i<currentStep?'done':''}">${i<currentStep?'\u2713 ':''}${s}</div>`).join('');
  document.getElementById('btn-back').style.visibility = currentStep===0 ? 'hidden' : 'visible';
  const btnNext = document.getElementById('btn-next');
  btnNext.textContent = currentStep===STEPS.length-1 ? 'Create campaign' : 'Continue';
  btnNext.disabled = (currentStep === 0 && !workspaceAccounts.length);
  [renderStepAccount, renderStepAudience, renderStepSequence, renderStepName][currentStep](document.getElementById('modal-body'));
}
async function nextStep() {
  if (currentStep===0 && !wizard.selectedAccount) return alert('Please select an account.');
  if (currentStep===1) {
    if (!wizard.list_id) return alert('Please select a list for this campaign.');
  }
  if (currentStep===STEPS.length-1) { await createCampaign(); return; }
  currentStep++; renderStep();
}
function prevStep() { if (currentStep>0) { currentStep--; renderStep(); } }

function renderStepAccount(body) {
  if (!workspaceAccounts.length) {
    body.innerHTML = `<div class="notice-box"><div class="notice-title">&#128273; Before you start, add at least one user.</div>No LinkedIn accounts connected yet. Please <a class="inline-link" href="${settingsUrl}">Add Users</a> in Settings, then come back here.</div>`;
    return;
  }
  body.innerHTML = `<div class="section-label">Select LinkedIn account</div><div class="user-grid">${workspaceAccounts.map(a=>`<div class="user-card${wizard.selectedAccount===a.account_id?' selected':''}" onclick="selectAccount('${a.account_id}')"><div class="user-avatar">${initials(a.display_name)}</div><div><div class="user-name">${esc(a.display_name)}</div></div></div>`).join('')}</div>`;
}
function selectAccount(id) {
  wizard.selectedAccount=id;
  document.querySelectorAll('.user-card').forEach(el=>el.classList.toggle('selected',el.getAttribute('onclick')===`selectAccount('${id}')`));
}

function renderStepAudience(body) {
  body.innerHTML = `<div class="section-label">Select a contacts list</div>
    <p style="font-size:13px;color:#888;margin:-4px 0 14px">Choose which list to use. Create lists in the <strong>Lists</strong> tab.</p>
    <div id="list-picker-grid" class="list-picker-grid"><div class="list-picker-loading">Loading…</div></div>`;
  loadListsForPicker();
}
function selectAudience(type) { wizard.audienceType=type; renderStepAudience(document.getElementById('modal-body')); }

function renderAudienceDetail() {
  const el = document.getElementById('audience-detail'); if (!el) return;
  if (wizard.audienceType==='people') {
    el.innerHTML=`<div class="field-label">Paste LinkedIn profile URLs (one per line)</div><textarea rows="5" placeholder="https://www.linkedin.com/in/johndoe" oninput="wizard.urlsPasted=this.value">${esc(wizard.urlsPasted)}</textarea><div style="font-size:12px;color:#999;margin-top:6px;" id="url-count">${countUrls(wizard.urlsPasted)} URLs detected</div>`;
    el.querySelector('textarea').addEventListener('input',function(){document.getElementById('url-count').textContent=countUrls(this.value)+' URLs detected';});
  } else if (wizard.audienceType==='company') {
    if (!wizard.searchStatus) {
      el.innerHTML=`
        <div class="field-label">Paste LinkedIn company URLs (one per line)</div>
        <textarea rows="4" placeholder="https://www.linkedin.com/company/bezeq\nhttps://www.linkedin.com/company/partner-communications" style="margin-bottom:12px;" oninput="wizard.companyUrls=this.value">${esc(wizard.companyUrls)}</textarea>
        <div class="field-label">Job titles to search for</div>
        <textarea rows="2" placeholder="VP R&D, Head of Engineering, CTO" style="margin-bottom:12px;" oninput="wizard.searchTitles=this.value">${esc(wizard.searchTitles)}</textarea>
        <div class="field-label">Target country <span style="color:#aaa;font-weight:400;font-size:11px;">(optional — narrows LinkedIn geo-filter)</span></div>
        <input type="text" class="country-input" placeholder="e.g. Israel, United States" value="${esc(wizard.targetCountry)}" oninput="wizard.targetCountry=this.value">
        <p style="font-size:12px;color:#1D9E75;margin-top:12px;">&#9654; Click <strong>Continue</strong> to search across all companies at once.</p>`;
    } else if (wizard.searchStatus==='loading') {
      el.innerHTML=`<div class="search-progress"><div style="font-size:40px;color:#1D9E75;display:inline-block;animation:spin 0.8s linear infinite;">&#8635;</div><div style="font-size:13px;color:#888;margin-top:8px;">Searching LinkedIn&hellip; this takes a few seconds.</div></div>`;
    } else {
      const selCount = wizard.selectedContactIndices.size;
      const allChecked = wizard.contacts.length > 0 && selCount === wizard.contacts.length;
      const previewBanner = wizard.isPreview
        ? `<div class="preview-notice">&#128203; <strong>First results shown</strong> \u2014 ${wizard.contacts.length} contacts found${wizard.targetCountry ? ' in <strong>'+esc(wizard.targetCountry)+'</strong>' : ''}. More will be fetched in the background after campaign creation.</div>`
        : '';
      const toolbar = `<div class="contacts-toolbar">
        <div class="contacts-toolbar-left">
          <input type="checkbox" class="contact-cb" id="cb-all" ${allChecked?'checked':''} onchange="toggleSelectAll(this.checked)">
          <label for="cb-all" style="cursor:pointer;user-select:none;">
            ${selCount > 0 ? `${selCount} selected` : `${wizard.contacts.length} contacts found`}
          </label>
        </div>
        <div class="contacts-toolbar-right">
          <button class="remove-sel-btn" onclick="removeSelected()" ${selCount===0?'disabled':''}>
            Remove selected${selCount>0?' ('+selCount+')':''}
          </button>
          <button class="ghost-btn" style="font-size:12px;" onclick="resetSearch()">Reset</button>
        </div>
      </div>`;
      const rows = wizard.contacts.map((c,i) => {
        const checked = wizard.selectedContactIndices.has(i);
        const name = esc(c.name||[c.first_name,c.last_name].filter(Boolean).join(' '));
        const subtitle = esc((c.headline||c.title||'') + (c.company?' \u00b7 '+c.company:''));
        return `<div class="contact-row${checked?' selected-row':''}">
          <input type="checkbox" class="contact-cb" ${checked?'checked':''} onchange="toggleContactSelect(${i},this.checked)">
          <div class="contact-info">
            <div class="contact-name">${name}</div>
            <div class="contact-title">${subtitle}</div>
          </div>
          <button class="contact-remove" onclick="removeWizContact(${i})" title="Remove">&times;</button>
        </div>`;
      }).join('');
      el.innerHTML = `${previewBanner}${toolbar}<div class="contacts-list">${rows}</div>`;
    }
  }
}

function toggleSelectAll(checked) {
  if (checked) { wizard.contacts.forEach((_,i) => wizard.selectedContactIndices.add(i)); }
  else { wizard.selectedContactIndices.clear(); }
  renderAudienceDetail();
}
function toggleContactSelect(i, checked) {
  if (checked) wizard.selectedContactIndices.add(i);
  else wizard.selectedContactIndices.delete(i);
  const selCount = wizard.selectedContactIndices.size;
  const total = wizard.contacts.length;
  const allCb = document.getElementById('cb-all');
  if (allCb) allCb.checked = selCount === total;
  const label = allCb?.nextElementSibling;
  if (label) label.textContent = selCount > 0 ? `${selCount} selected` : `${total} contacts found`;
  const removeBtn = document.querySelector('.remove-sel-btn');
  if (removeBtn) { removeBtn.disabled = selCount === 0; removeBtn.textContent = `Remove selected${selCount>0?' ('+selCount+')':''}`; }
  const row = document.querySelectorAll('.contact-row')[i];
  if (row) row.classList.toggle('selected-row', checked);
}
function removeSelected() {
  if (!wizard.selectedContactIndices.size) return;
  wizard.contacts = wizard.contacts.filter((_,i) => !wizard.selectedContactIndices.has(i));
  wizard.selectedContactIndices.clear();
  renderAudienceDetail();
}
function removeWizContact(i) {
  wizard.contacts.splice(i, 1);
  const newSel = new Set();
  wizard.selectedContactIndices.forEach(idx => { if (idx < i) newSel.add(idx); else if (idx > i) newSel.add(idx - 1); });
  wizard.selectedContactIndices = newSel;
  renderAudienceDetail();
}

async function startSearch() {
  if (!wizard.companyUrls.trim()) return;
  if (!wizard.searchTitles.trim()) return;
  const allUrls=wizard.companyUrls.split('\n').map(s=>s.trim()).filter(s=>s.includes('linkedin.com/company/'));
  if (!allUrls.length) return;
  wizard.allCompanyUrls = allUrls;
  wizard.searchStatus='loading'; renderAudienceDetail();
  try {
    const ti=wizard.searchTitles.split(',').map(s=>s.trim()).filter(Boolean);
    const res=await fetch('/api/campaigns/search-people',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({account_id:wizard.selectedAccount,company_urls:allUrls,titles:ti,target_country:wizard.targetCountry||''})});
    const data=await res.json();
    if(!res.ok) throw new Error(data.error||'Search failed');
    wizard.searchStatus='done';
    wizard.contacts=Array.isArray(data.items)?data.items:[];
    wizard.selectedContactIndices=new Set();
    wizard.companiesMeta=[];
    wizard.keywordsQuery=data.keywords_query||'';
    wizard.nextCursor=data.next_cursor||null;
    wizard.totalCompanies=allUrls.length;
    wizard.isPreview=!!data.next_cursor;
  } catch(err){wizard.searchStatus=null;alert('Search failed: '+err.message);}
  renderAudienceDetail();
}
function resetSearch() { wizard.searchStatus=null;wizard.contacts=[];wizard.selectedContactIndices=new Set();wizard.companiesMeta=[];wizard.isPreview=false;wizard.keywordsQuery='';wizard.nextCursor=null;wizard.targetCountry='';renderAudienceDetail(); }

function renderStepSequence(body) {
  const engHtml=ENGAGEMENT_ACTIONS.map(a=>`<div class="engagement-item"><div><div class="eng-label">${a.label}</div>${a.sub?`<div class="eng-sub">${a.sub}</div>`:''}</div><button class="toggle${wizard.engagement[a.key]?' on':''}" id="eng-${a.key}" onclick="toggleEng('${a.key}')"></button></div>`).join('');
  body.innerHTML=`
    <div class="conn-section">
      <div class="conn-row"><div><div class="conn-label">Send connection requests</div><div class="conn-sub">Automatically send LinkedIn invites to all prospects</div></div><button class="toggle${wizard.connectionEnabled?' on':''}" id="conn-toggle" onclick="toggleConn()"></button></div>
      <div id="conn-opts" class="conn-options" style="display:${wizard.connectionEnabled?'':'none'};">
        <div class="conn-opt-row"><div class="conn-opt-label">Withdraw if not accepted after</div><div style="display:flex;align-items:center;gap:8px;"><input class="num-input" type="number" value="${wizard.withdrawDays}" min="1" oninput="wizard.withdrawDays=this.value"> days<button class="toggle${wizard.withdrawEnabled?' on':''}" id="withdraw-toggle" onclick="toggleWithdraw()"></button></div></div>
        <div id="resend-row" style="display:${wizard.withdrawEnabled?'':'none'};" class="conn-opt-row"><div class="conn-opt-label">Resend request after 21+ days</div><button class="toggle${wizard.resendEnabled?' on':''}" id="resend-toggle" onclick="toggleResend()"></button></div>
      </div>
    </div>
    <div class="section-label">Message sequences</div>
    <div class="sequence-grid">
      <div class="sequence-canvas"><div class="seq-head"><div class="seq-head-title">New contacts</div><div class="seq-head-sub">Not yet connected</div></div><div class="seq-body" id="canvas-new">${renderMsgs(wizard.newMessages,'new')}<button class="add-msg-btn" onclick="openMsgDialog('new')">+ Add message</button></div></div>
      <div style="display:flex;flex-direction:column;gap:10px;">
        <div class="sequence-canvas"><div class="seq-head"><div class="seq-head-title">Existing \u2014 no history</div><div class="seq-head-sub">Connected, never messaged</div></div><div class="seq-body" id="canvas-existingNo">${renderMsgs(wizard.existingNoHistoryMessages,'existingNo')}<button class="add-msg-btn" onclick="openMsgDialog('existingNo')">+ Add message</button></div></div>
        <div class="sequence-canvas"><div class="seq-head"><div class="seq-head-title">Existing \u2014 with history</div><div class="seq-head-sub">Connected, previous conversation</div></div><div class="seq-body" id="canvas-existingYes">${renderMsgs(wizard.existingWithHistoryMessages,'existingYes')}<button class="add-msg-btn" onclick="openMsgDialog('existingYes')">+ Add message</button></div></div>
      </div>
    </div>
    <div class="section-label" style="margin-top:20px;">Engagement actions</div>
    <div class="engagement-list">${engHtml}</div>`;
}
function renderMsgs(msgs,canvas) {
  return msgs.map((m,i)=>{const variants=m.variants||(m.text?[{label:'A',text:m.text}]:[]);const preview=variants[0]?.text||'';const badges=variants.length>1?`<span class="variant-badge">${variants.map(v=>`<span class="vbadge vbadge-${v.label.toLowerCase()}">${v.label}</span>`).join('')}</span>`:'';return `<div class="seq-msg"><button class="seq-msg-remove" onclick="removeMsg('${canvas}',${i})">&times;</button><div class="seq-msg-delay">Wait ${m.delay} ${m.unit} ${badges}</div><div class="seq-msg-text">${esc(preview.slice(0,80))}${preview.length>80?'...':''}</div></div>`;}).join('');
}
function toggleConn()    { wizard.connectionEnabled=!wizard.connectionEnabled;document.getElementById('conn-toggle').classList.toggle('on',wizard.connectionEnabled);document.getElementById('conn-opts').style.display=wizard.connectionEnabled?'':'none'; }
function toggleWithdraw(){ wizard.withdrawEnabled=!wizard.withdrawEnabled;document.getElementById('withdraw-toggle').classList.toggle('on',wizard.withdrawEnabled);document.getElementById('resend-row').style.display=wizard.withdrawEnabled?'':'none'; }
function toggleResend()  { wizard.resendEnabled=!wizard.resendEnabled;document.getElementById('resend-toggle').classList.toggle('on',wizard.resendEnabled); }
function toggleEng(key)  { wizard.engagement[key]=!wizard.engagement[key];document.getElementById('eng-'+key).classList.toggle('on',wizard.engagement[key]); }
function removeMsg(canvas,i) { if(canvas==='new')wizard.newMessages.splice(i,1);if(canvas==='existingNo')wizard.existingNoHistoryMessages.splice(i,1);if(canvas==='existingYes')wizard.existingWithHistoryMessages.splice(i,1);renderStep(); }

function renderStepName(body) {
  const acc=workspaceAccounts.find(a=>a.account_id===wizard.selectedAccount);
  const fetchNotice = wizard.isPreview
    ? `<div class="preview-notice" style="margin-top:12px;">&#9200; More contacts will be fetched automatically in the background after campaign creation.</div>`
    : '';
  const as = wizard.isPreview
    ? `${wizard.contacts.length} contacts (${wizard.totalCompanies} companies${wizard.targetCountry?' · '+wizard.targetCountry:''})`
    : wizard.audienceType==='people' ? countUrls(wizard.urlsPasted)+' profile URLs' : wizard.contacts.length+' contacts from search';
  const daysHtml=DAYS.map(d=>{const h=wizard.hours[d.key];return `<div class="day-card${h.on?'':' off'}" id="wdc-${d.key}"><div class="day-head"><span class="day-name">${d.label}</span><button class="day-toggle${h.on?' on':''}" id="wdt-${d.key}" onclick="wizToggleDay('${d.key}')"></button></div><div id="wdts-${d.key}" style="display:${h.on?'':'none'}"><div class="time-inputs"><div class="time-row"><span class="time-lbl">from</span><input class="time-input" type="time" value="${h.from}" onchange="wizUpdateHour('${d.key}','from',this.value)"></div><div class="time-row"><span class="time-lbl">to</span><input class="time-input" type="time" value="${h.to}" onchange="wizUpdateHour('${d.key}','to',this.value)"></div></div></div><div id="wdof-${d.key}" class="day-off-label" style="display:${h.on?'none':''}">off</div></div>`;}).join('');
  const ad=DAYS.filter(d=>wizard.hours[d.key].on).map(d=>d.label);
  const fa=DAYS.find(d=>wizard.hours[d.key].on);
  const hs=ad.length?ad.join(', ')+(fa?' \u00b7 '+wizard.hours[fa.key].from+'\u2013'+wizard.hours[fa.key].to:''):'No active days';
  body.innerHTML=`<div class="section-label">Campaign name</div><input class="name-input" type="text" placeholder="e.g. CLY \u2014 VPs in Israeli Telcos" value="${esc(wizard.campaignName)}" oninput="wizard.campaignName=this.value" autofocus>${fetchNotice}<div style="margin-top:24px;"><div class="section-label">Working hours</div><div style="font-size:12px;color:#888;margin-bottom:10px;">The campaign only runs during these hours.</div><div class="hours-grid">${daysHtml}</div></div><div class="summary-box"><div style="font-size:12px;font-weight:600;color:#888;margin-bottom:10px;">Summary</div><div class="summary-row"><span class="summary-key">Account</span><span class="summary-val">${esc(acc?.display_name||'\u2014')}</span></div><div class="summary-row"><span class="summary-key">Audience</span><span class="summary-val">${as}</span></div>${wizard.targetCountry?`<div class="summary-row"><span class="summary-key">Target country</span><span class="summary-val">&#127757; ${esc(wizard.targetCountry)}</span></div>`:''}<div class="summary-row"><span class="summary-key">Connection requests</span><span class="summary-val">${wizard.connectionEnabled?'Yes':'No'}</span></div><div class="summary-row"><span class="summary-key">New contact messages</span><span class="summary-val">${wizard.newMessages.length} step${wizard.newMessages.length!==1?'s':''}</span></div><div class="summary-row"><span class="summary-key">Engagement actions</span><span class="summary-val">${Object.values(wizard.engagement).filter(Boolean).length} enabled</span></div><div class="summary-row"><span class="summary-key">Working hours</span><span class="summary-val" id="hours-summary">${esc(hs)}</span></div></div>`;
}
function wizToggleDay(key) {
  const h=wizard.hours[key]; h.on=!h.on;
  const card=document.getElementById('wdc-'+key),toggle=document.getElementById('wdt-'+key),times=document.getElementById('wdts-'+key),off=document.getElementById('wdof-'+key);
  if(toggle)toggle.classList.toggle('on',h.on);if(card)card.classList.toggle('off',!h.on);
  if(times)times.style.display=h.on?'':'none';if(off)off.style.display=h.on?'none':'';
  const ad=DAYS.filter(d=>wizard.hours[d.key].on).map(d=>d.label);const fa=DAYS.find(d=>wizard.hours[d.key].on);
  const el=document.getElementById('hours-summary');if(el)el.textContent=ad.length?ad.join(', ')+(fa?' \u00b7 '+wizard.hours[fa.key].from+'\u2013'+wizard.hours[fa.key].to:''):'No active days';
}
function wizUpdateHour(key,field,value){wizard.hours[key][field]=value;}

async function loadListsForPicker() {
  const grid = document.getElementById('list-picker-grid');
  if (!grid) return;
  try {
    const data = await fetch('/api/lists?workspace_id=' + workspaceId).then(r=>r.json());
    const lists = (data.items || []).filter(l => l.type === 'contacts');
    if (!lists.length) {
      grid.innerHTML = '<div class="list-picker-loading">No contact lists yet — go to <strong>Lists</strong> tab to create one.</div>';
      return;
    }
    grid.innerHTML = lists.map(l => {
      const sel = wizard.list_id === l.id;
      const cnt = l.contact_count || 0;
      const desc = l.description ? ' · ' + l.description : '';
      return '<div class="list-picker-card' + (sel ? ' selected' : '') + '" data-id="' + l.id + '" data-name="' + (l.name||'').replace(/"/g,'&quot;') + '">' +
        '<div class="lpc-icon">&#128101;</div>' +
        '<div class="lpc-info">' +
          '<div class="lpc-name">' + (l.name||'') + '</div>' +
          '<div class="lpc-count">' + cnt + ' contacts' + desc + '</div>' +
        '</div>' +
        (sel ? '<div class="lpc-check">&#10003;</div>' : '') +
        '</div>';
    }).join('');
    // Attach click handlers (no inline onclick = no escaping issues)
    grid.querySelectorAll('.list-picker-card').forEach(function(card) {
      card.addEventListener('click', function() {
        selectList(parseInt(card.dataset.id), card.dataset.name);
      });
    });
  } catch(e) {
    grid.innerHTML = '<div class="list-picker-loading" style="color:#e53e3e">Failed: ' + e.message + '</div>';
  }
}


function selectList(id, name) {
  wizard.list_id = id;
  wizard.list_name = name;
  loadListsForPicker();
}

async function createCampaign() {
  if (!wizard.campaignName.trim()) return alert('Please enter a campaign name.');
  const btn=document.getElementById('btn-next');btn.disabled=true;btn.textContent='Creating...';
  let contacts=[];
  if (wizard.audienceType==='people') {
    contacts=wizard.urlsPasted.split('\n').map(s=>s.trim()).filter(s=>s.includes('linkedin.com/in/')).map(url=>({li_profile_url:url}));
  } else {
    contacts=wizard.contacts.map(c=>({first_name:c.first_name||c.name?.split(' ')[0]||'',last_name:c.last_name||c.name?.split(' ').slice(1).join(' ')||'',company:c.company||'',title:c.headline||c.title||'',li_profile_url:c.public_profile_url||c.li_profile_url||''}));
  }
  try {
    const res=await fetch('/api/campaigns',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({workspace_id:workspaceId,account_id:wizard.selectedAccount,name:wizard.campaignName,audience_type:wizard.audienceType,contacts,settings:{connection:{enabled:wizard.connectionEnabled,withdraw_after_days:wizard.withdrawEnabled?parseInt(wizard.withdrawDays)||14:0,resend:wizard.resendEnabled},engagement:wizard.engagement,messages:{new:wizard.newMessages,existing_no_history:wizard.existingNoHistoryMessages,existing_with_history:wizard.existingWithHistoryMessages},hours:wizard.hours,searchConfig:wizard.audienceType==='company'?{titles:wizard.searchTitles.split(',').map(s=>s.trim()).filter(Boolean),companyUrls:wizard.allCompanyUrls||[],keywordsQuery:wizard.keywordsQuery||'',nextCursor:wizard.nextCursor||null,targetCountry:wizard.targetCountry||''}:null}})}); 
    const newCamp = await res.json();
    if (!res.ok) throw new Error(newCamp.error);
    if (wizard.audienceType==='company' && (wizard.allCompanyUrls||[]).length > 4) {
      fetch(`/api/campaigns/${newCamp.id}/fetch-all-companies?workspace_id=${workspaceId}`, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({workspace_id:workspaceId})}).catch(()=>{});
    }
    closeModal(); await load();
  } catch(err){alert('Failed: '+err.message);btn.disabled=false;btn.textContent='Create campaign';}
}

const VARIANT_LABELS=['A','B','C'];

function openMsgDialog(canvas) {
  msgEditCanvas = null;
  activeMsgCanvas=canvas;
  const titles={new:'New contacts',existingNo:'Existing \u2014 no history',existingYes:'Existing \u2014 with history'};
  document.getElementById('msg-dialog-title').textContent='Add message \u2014 '+titles[canvas];
  document.getElementById('msg-delay-val').value=3;
  document.getElementById('msg-delay-unit').value='days';
  dlgVariants=[{label:'A',text:''}];
  renderDlgVariants();
  document.getElementById('msg-dialog').style.display='flex';
}

function renderDlgVariants() {
  const VCLASS={A:'variant-a',B:'variant-b',C:'variant-c'};
  document.getElementById('variant-sections').innerHTML=dlgVariants.map((v,i)=>`<div class="variant-section" style="border-color:${i===0?'#DDD6FE':i===1?'#BFDBFE':'#FDE68A'};"><div class="variant-section-head"><div class="variant-section-label"><span class="variant-pill ${VCLASS[v.label]}">${v.label}</span>${i===0?'<span style="font-size:11px;color:#888;">(required)</span>':'<span style="font-size:11px;color:#888;">(optional \u2014 A/B)</span>'}</div>${i>0?`<button class="variant-remove-btn" onclick="removeVariant(${i})">&times;</button>`:''}</div><div class="tokens-row"><button class="token-btn" onclick="insertVariantToken(${i},'{{first_name}}')">&#123;&#123;first_name&#125;&#125;</button><button class="token-btn" onclick="insertVariantToken(${i},'{{last_name}}')">&#123;&#123;last_name&#125;&#125;</button><button class="token-btn" onclick="insertVariantToken(${i},'{{company}}')">&#123;&#123;company&#125;&#125;</button></div><textarea id="variant-ta-${i}" rows="4" placeholder="Hi {{first_name}}, I came across your profile..." oninput="dlgVariants[${i}].text=this.value">${esc(v.text)}</textarea></div>`).join('');
  const addEl=document.getElementById('add-variant-area');
  addEl.innerHTML=dlgVariants.length<3?`<button class="add-variant-btn" onclick="addVariant()">+ Add Variant ${VARIANT_LABELS[dlgVariants.length]} (A/B test)</button>`:'';
}

function addVariant() { if(dlgVariants.length>=3)return; dlgVariants.push({label:VARIANT_LABELS[dlgVariants.length],text:''}); renderDlgVariants(); }
function removeVariant(i) { dlgVariants.splice(i,1); dlgVariants=dlgVariants.map((v,idx)=>({...v,label:VARIANT_LABELS[idx]})); renderDlgVariants(); }
function insertVariantToken(i,token) { const ta=document.getElementById('variant-ta-'+i);if(!ta)return;const p=ta.selectionStart;ta.value=ta.value.slice(0,p)+token+ta.value.slice(p);dlgVariants[i].text=ta.value;ta.selectionStart=ta.selectionEnd=p+token.length;ta.focus(); }
function closeMsgDialog() { document.getElementById('msg-dialog').style.display='none'; }

function saveMsgDialog() {
  if (!dlgVariants[0]?.text?.trim()) return alert('Variant A cannot be empty.');
  const variants=dlgVariants.map(v=>({label:v.label,text:v.text.trim()})).filter(v=>v.text);
  const msg={delay:document.getElementById('msg-delay-val').value,unit:document.getElementById('msg-delay-unit').value,variants};
  if (msgEditCanvas !== null) {
    const key=CKEY[msgEditCanvas];
    if (!cmSettings.messages) cmSettings.messages={};
    if (!cmSettings.messages[key]) cmSettings.messages[key]=[];
    cmSettings.messages[key].push(msg);
    closeMsgDialog(); msgEditCanvas=null; refreshCMSeq(); return;
  }
  if (activeMsgCanvas==='new') wizard.newMessages.push(msg);
  if (activeMsgCanvas==='existingNo') wizard.existingNoHistoryMessages.push(msg);
  if (activeMsgCanvas==='existingYes') wizard.existingWithHistoryMessages.push(msg);
  closeMsgDialog(); renderStep();
}

load();
</script>
<script src="campaign-modal.js">
async function loadListsForPicker() {
  const grid = document.getElementById('list-picker-grid');
  if (!grid) return;
  try {
    const data = await fetch('/api/lists?workspace_id=' + workspaceId).then(r=>r.json());
    const contactLists = (data.items||[]).filter(l => l.type === 'contacts');
    if (!contactLists.length) {
      grid.innerHTML = '<div class="list-picker-empty">No contact lists yet. <a href="javascript:void(0)" onclick="closeModal()">Go to Lists</a> to create one first.</div>';
      return;
    }
    grid.innerHTML = contactLists.map(l => {
      const isSel = wizard.list_id === l.id;
      return '<div class="list-picker-card' + (isSel?' selected':'') + '" onclick="selectList(' + l.id + ',' + JSON.stringify(l.name) + ')">' +
        '<span class="lpc-icon">👥</span>' +
        '<div><div class="lpc-name">' + escHtml(l.name) + '</div>' +
        '<div class="lpc-count">' + (l.contact_count||0) + ' contacts</div></div>' +
        '<span class="lpc-check">✓</span>' +
        '</div>';
    }).join('');
  } catch(e) {
    grid.innerHTML = '<div class="list-picker-loading" style="color:#ef4444">Failed to load lists: ' + e.message + '</div>';
  }
}

function selectList(id, name) {
  wizard.list_id = id;
  wizard.list_name = name;
  wizard.list_type = 'contacts';
  document.querySelectorAll('.list-picker-card').forEach(el => el.classList.remove('selected'));
  // Find clicked card and select it
  const cards = document.querySelectorAll('.list-picker-card');
  cards.forEach(el => {
    if (el.querySelector('.lpc-name') && el.querySelector('.lpc-name').textContent === name) {
      el.classList.add('selected');
      el.querySelector('.lpc-check').style.display = 'block';
    }
  });
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
