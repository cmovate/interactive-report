<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Opportunities</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f8f9fa; }
.page-header { background: white; padding: 20px 24px 16px; border-bottom: 1px solid #e5e7eb; }
.page-header h1 { font-size: 18px; font-weight: 600; color: #111827; }
.page-header p { font-size: 13px; color: #6b7280; margin-top: 4px; max-width: 560px; }
.page-body { padding: 20px 24px; }
.status-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; font-size: 12px; color: #6b7280; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: #1D9E75; flex-shrink: 0; }
.co-block { background: white; border-radius: 10px; box-shadow: 0 1px 3px rgba(0,0,0,.06); margin-bottom: 12px; overflow: hidden; }
.co-header { display: flex; align-items: center; gap: 10px; padding: 14px 18px; border-bottom: 1px solid #f3f4f6; }
.co-name { font-weight: 600; color: #111827; font-size: 14px; }
.co-link { color: #1D9E75; font-size: 12px; text-decoration: none; }
.co-link:hover { text-decoration: underline; }
.list-tag { background: #f0fdf4; color: #065f46; border: 1px solid #bbf7d0; border-radius: 10px; padding: 2px 8px; font-size: 11px; font-weight: 500; margin-left: auto; }
.co-connections { padding: 14px 18px; }
.scanning-msg { display: flex; align-items: center; gap: 8px; color: #6b7280; font-size: 13px; }
.spinner { width: 14px; height: 14px; border: 2px solid #e5e7eb; border-top-color: #1D9E75; border-radius: 50%; animation: spin .6s linear infinite; flex-shrink: 0; }
@keyframes spin { to { transform: rotate(360deg); } }
.no-connections { color: #9ca3af; font-size: 13px; padding: 4px 0; }
.contacts-list { display: flex; flex-direction: column; gap: 8px; }
.contact-card { display: flex; align-items: flex-start; gap: 12px; padding: 10px 12px; background: #f9fafb; border-radius: 8px; }
.avatar { width: 38px; height: 38px; border-radius: 50%; background: #e5e7eb; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; color: #6b7280; overflow: hidden; }
.avatar img { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; }
.contact-body { flex: 1; min-width: 0; }
.contact-name { font-weight: 600; color: #111827; font-size: 13px; }
.contact-headline { font-size: 12px; color: #6b7280; margin-top: 1px; }
.contact-footer { display: flex; align-items: center; gap: 8px; margin-top: 5px; flex-wrap: wrap; }
.li-btn { color: #1D9E75; font-size: 11px; text-decoration: none; }
.li-btn:hover { text-decoration: underline; }
.via-tag { background: #eff6ff; border: 1px solid #bfdbfe; color: #1e40af; border-radius: 10px; padding: 2px 8px; font-size: 11px; font-weight: 500; }
.connections-count { font-size: 12px; font-weight: 600; color: #1D9E75; margin-bottom: 10px; }
.empty-state { text-align: center; padding: 60px; color: #9ca3af; }
.empty-state h3 { font-size: 15px; font-weight: 500; color: #374151; margin-bottom: 6px; }
</style>
</head>
<body>
<div class="page-header">
  <h1>&#128161; Opportunities</h1>
  <p>Turn your existing data into warm introductions. See who your team is already connected to at target companies.</p>
</div>
<div class="page-body">
  <div class="status-bar"><span class="status-dot"></span><span id="status-text">Loading...</span></div>
  <div id="co-list"></div>
</div>
<script>
var params = new URLSearchParams(window.location.search);
var workspaceId = params.get('workspace_id');
var companies = [];
var scanResults = {};
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function init() {
  if (!workspaceId) return;
  fetch('/api/lists/companies?workspace_id=' + workspaceId)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      companies = data.items || [];
      document.getElementById('status-text').textContent = companies.length + ' companies from your lists';
      renderAll();
      companies.forEach(function(co) { doScan(co); });
    }).catch(function(e) {
      document.getElementById('status-text').textContent = 'Error: ' + e.message;
    });
}
function renderAll() {
  var list = document.getElementById('co-list');
  if (!companies.length) {
    list.innerHTML = '<div class="empty-state"><h3>No companies yet</h3><p>Add companies via List 2.</p></div>';
    return;
  }
  list.innerHTML = '';
  companies.forEach(function(co) {
    var block = document.createElement('div');
    block.className = 'co-block';
    block.id = 'co-' + co.id;
    block.innerHTML = renderBlock(co);
    list.appendChild(block);
  });
}
function renderBlock(co) {
  var res = scanResults[co.id];
  var h = '<div class="co-header">'
    + '<span class="co-name">' + esc(co.company_name) + '</span>'
    + (co.li_company_url ? ' <a class="co-link" href="' + esc(co.li_company_url) + '" target="_blank">View on LinkedIn</a>' : '')
    + '<span class="list-tag">' + esc(co.list_name||'') + '</span>'
    + '</div>';
  var body;
  if (!res || res.scanning) {
    body = '<div class="co-connections"><div class="scanning-msg"><span class="spinner"></span> Scanning LinkedIn...</div></div>';
  } else if (!res.contacts || !res.contacts.length) {
    body = '<div class="co-connections"><div class="no-connections">No 1st-degree connections found.</div></div>';
  } else {
    var n = res.contacts.length;
    var cards = res.contacts.map(function(c) {
      var init = ((c.first_name||'?')[0]+(c.last_name||'?')[0]).toUpperCase();
      var av = c.profile_picture ? '<img src="'+esc(c.profile_picture)+'" onerror="this.parentNode.textContent=this.parentNode.textContent">' : init;
      var via = (c.connected_via||[]).map(function(v) {
        return '<span class="via-tag">via ' + esc(v.name) + '</span>';
      }).join(' ');
      var nm = esc(((c.first_name||'')+' '+(c.last_name||'')).trim()||'Unknown');
      return '<div class="contact-card">'
        + '<div class="avatar">' + av + '</div>'
        + '<div class="contact-body">'
        + '<div class="contact-name">' + nm + '</div>'
        + (c.headline ? '<div class="contact-headline">'+esc(c.headline)+'</div>' : '')
        + '<div class="contact-footer">'
        + '<a class="li-btn" href="'+esc(c.li_profile_url)+'" target="_blank">View profile</a>'
        + (via ? ' &middot; ' + via : '')
        + '</div></div></div>';
    }).join('');
    body = '<div class="co-connections">'
      + '<div class="connections-count">' + n + ' connection' + (n!==1?'s':'') + ' found</div>'
      + '<div class="contacts-list">' + cards + '</div>'
      + '</div>';
  }
  return h + body;
}
function doScan(co) {
  scanResults[co.id] = { scanning: true };
  var el = document.getElementById('co-' + co.id);
  if (el) el.innerHTML = renderBlock(co);
  fetch('/api/opportunities/scan-company', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ workspace_id: parseInt(workspaceId), company_name: co.company_name, li_company_url: co.li_company_url, company_linkedin_id: co.company_linkedin_id })
  }).then(function(r) { return r.json(); })
  .then(function(data) {
    scanResults[co.id] = { scanning: false, contacts: data.contacts || [] };
    var el2 = document.getElementById('co-' + co.id);
    if (el2) el2.innerHTML = renderBlock(co);
  }).catch(function() {
    scanResults[co.id] = { scanning: false, contacts: [] };
    var el3 = document.getElementById('co-' + co.id);
    if (el3) el3.innerHTML = renderBlock(co);
  });
}
init();
</script>
</body>
</html>
