<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Opportunities</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f8f9fa; }
.page-header { background: white; padding: 20px 24px 16px; border-bottom: 1px solid #e5e7eb; }
.page-header h1 { font-size: 18px; font-weight: 600; color: #111827; }
.page-header p { font-size: 13px; color: #6b7280; margin-top: 4px; max-width: 560px; }
.page-body { padding: 20px 24px; }
.status-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; font-size: 12px; color: #6b7280; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: #1D9E75; flex-shrink: 0; }
.co-block { background: white; border-radius: 10px; box-shadow: 0 1px 3px rgba(0,0,0,.06); margin-bottom: 16px; overflow: hidden; }
.co-header { display: flex; align-items: center; gap: 10px; padding: 14px 18px; background: #f9fafb; border-bottom: 1px solid #e5e7eb; }
.co-name { font-weight: 700; color: #111827; font-size: 15px; }
.co-link { color: #1D9E75; font-size: 12px; text-decoration: none; }
.co-link:hover { text-decoration: underline; }
.list-tag { background: #f0fdf4; color: #065f46; border: 1px solid #bbf7d0; border-radius: 10px; padding: 2px 8px; font-size: 11px; font-weight: 500; margin-left: auto; }
.co-count { font-size: 12px; color: #6b7280; }
.scanning-row { padding: 16px 18px; display: flex; align-items: center; gap: 8px; color: #6b7280; font-size: 13px; }
.spinner { width: 14px; height: 14px; border: 2px solid #e5e7eb; border-top-color: #1D9E75; border-radius: 50%; animation: spin .6s linear infinite; flex-shrink: 0; }
@keyframes spin { to { transform: rotate(360deg); } }
.no-conn { padding: 16px 18px; color: #9ca3af; font-size: 13px; }
.co-table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { padding: 9px 14px; text-align: left; font-size: 11px; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: .05em; border-bottom: 1px solid #e5e7eb; white-space: nowrap; }
td { padding: 10px 14px; border-bottom: 1px solid #f3f4f6; color: #374151; vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #fafafa; }
.contact-name { font-weight: 500; color: #111827; }
.li-link { color: #1D9E75; font-size: 12px; text-decoration: none; }
.li-link:hover { text-decoration: underline; }
.via-tags { display: flex; flex-wrap: wrap; gap: 4px; }
.via-tag { background: #eff6ff; border: 1px solid #bfdbfe; color: #1e40af; border-radius: 10px; padding: 2px 7px; font-size: 11px; font-weight: 500; white-space: nowrap; }
.btn-msg { background: #1D9E75; color: white; border: none; padding: 5px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; font-weight: 500; white-space: nowrap; }
.btn-msg:hover { background: #178a65; }
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); display: none; align-items: center; justify-content: center; z-index: 1000; }
.overlay.open { display: flex; }
.modal { background: white; border-radius: 12px; width: 480px; max-width: 95vw; padding: 24px; box-shadow: 0 20px 60px rgba(0,0,0,.2); }
.modal h3 { font-size: 15px; font-weight: 600; margin-bottom: 4px; color: #111827; }
.modal-sub { font-size: 12px; color: #6b7280; margin-bottom: 16px; }
.modal-from { font-size: 12px; color: #374151; margin-bottom: 10px; }
.modal-from select { padding: 5px 8px; border: 1px solid #e5e7eb; border-radius: 6px; font-size: 12px; margin-left: 6px; }
textarea.msg-box { width: 100%; height: 100px; padding: 10px; border: 1.5px solid #e5e7eb; border-radius: 8px; font-size: 13px; resize: vertical; font-family: inherit; }
textarea.msg-box:focus { outline: none; border-color: #1D9E75; }
.modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 14px; }
.btn-cancel { padding: 7px 14px; border: 1.5px solid #e5e7eb; border-radius: 7px; background: white; cursor: pointer; font-size: 13px; }
.btn-send { padding: 7px 16px; background: #1D9E75; color: white; border: none; border-radius: 7px; cursor: pointer; font-size: 13px; font-weight: 600; }
.btn-send:disabled { background: #9ca3af; cursor: default; }
.msg-result { font-size: 12px; margin-top: 8px; min-height: 16px; }
.msg-ok { color: #16a34a; } .msg-err { color: #dc2626; }
.empty-state { text-align: center; padding: 60px; color: #9ca3af; }
.empty-state h3 { font-size: 15px; font-weight: 500; color: #374151; margin-bottom: 6px; }
</style>
</head>
<body>
<div class="page-header">
  <h1>&#128161; Opportunities</h1>
  <p>Turn your existing data into warm introductions. See who your team is already connected to at target companies.</p>
</div>
<div class="page-body">
  <div class="status-bar"><span class="status-dot"></span><span id="status-text">Loading...</span></div>
  <div id="co-list"></div>
</div>
<div class="overlay" id="dm-overlay">
  <div class="modal">
    <h3>Send message</h3>
    <div class="modal-sub" id="dm-sub"></div>
    <div class="modal-from">Send from: <select id="dm-from-sel"></select></div>
    <textarea class="msg-box" id="dm-text" placeholder="Write your message..."></textarea>
    <div class="msg-result" id="dm-result"></div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeDM()">Cancel</button>
      <button class="btn-send" id="dm-send-btn" onclick="sendDM()">Send</button>
    </div>
  </div>
</div>
<script>
var params = new URLSearchParams(window.location.search);
var workspaceId = params.get('workspace_id');
var companies = [];
var scanResults = {};
var accounts = [];
var dmTarget = null;
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function init() {
  if (!workspaceId) return;
  fetch('/api/workspaces/' + workspaceId + '/accounts').then(r=>r.json()).then(function(d) {
    accounts = d.items || [];
    var sel = document.getElementById('dm-from-sel');
    sel.innerHTML = '';
    accounts.forEach(function(a) {
      var opt = document.createElement('option');
      opt.value = a.account_id;
      opt.textContent = a.display_name;
      sel.appendChild(opt);
    });
  });
  fetch('/api/lists/companies?workspace_id=' + workspaceId)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      companies = data.items || [];
      document.getElementById('status-text').textContent = companies.length + ' companies from your lists';
      renderAll();
      companies.forEach(function(co) { doScan(co); });
    }).catch(function(e) {
      document.getElementById('status-text').textContent = 'Error: ' + e.message;
    });
}
function renderAll() {
  var list = document.getElementById('co-list');
  if (!companies.length) {
    list.innerHTML = '<div class="empty-state"><h3>No companies yet</h3><p>Add companies via List 2.</p></div>';
    return;
  }
  list.innerHTML = '';
  companies.forEach(function(co) {
    var block = document.createElement('div');
    block.className = 'co-block';
    block.id = 'co-' + co.id;
    block.innerHTML = renderBlock(co);
    list.appendChild(block);
  });
}
function renderBlock(co) {
  var res = scanResults[co.id];
  var hdr = '<div class="co-header">'
    + '<span class="co-name">' + esc(co.company_name) + '</span>'
    + (co.li_company_url ? ' <a class="co-link" href="' + esc(co.li_company_url) + '" target="_blank">View on LinkedIn</a>' : '')
    + (res && !res.scanning && res.contacts ? '<span class="co-count">' + res.contacts.length + ' connection' + (res.contacts.length!==1?'s':'') + ' found</span>' : '')
    + '<span class="list-tag">' + esc(co.list_name||'') + '</span>'
    + '</div>';
  var body;
  if (!res || res.scanning) {
    body = '<div class="scanning-row"><span class="spinner"></span> Scanning LinkedIn...</div>';
  } else if (!res.contacts || !res.contacts.length) {
    body = '<div class="no-conn">No 1st-degree connections found at this company.</div>';
  } else {
    var rows = res.contacts.map(function(c, i) {
      var nm = esc(((c.first_name||'')+' '+(c.last_name||'')).trim()||'—');
      var viaTags = (c.connected_via||[]).map(function(v) {
        return '<span class="via-tag">via ' + esc(v.name) + '</span>';
      }).join(' ');
      return '<tr>'
        + '<td class="contact-name">' + nm + '</td>'
        + '<td>' + esc(c.company||'—') + '</td>'
        + '<td>' + esc(c.headline||'—') + '</td>'
        + '<td>' + (c.li_profile_url ? '<a class="li-link" href="'+esc(c.li_profile_url)+'" target="_blank">View profile</a>' : '—') + '</td>'
        + '<td><div class="via-tags">' + (viaTags||'<span class="via-tag">—</span>') + '</div></td>'
        + '<td><button class="btn-msg" onclick="openDM(' + i + ',\'' + co.id + '\')">&rarr; Message</button></td>'
        + '</tr>';
    }).join('');
    body = '<div class="co-table-wrap"><table>'
      + '<thead><tr><th>First + Last name</th><th>Company</th><th>Title</th><th>LinkedIn</th><th>Connected via</th><th></th></tr></thead>'
      + '<tbody>' + rows + '</tbody>'
      + '</table></div>';
  }
  return hdr + body;
}
function doScan(co) {
  scanResults[co.id] = { scanning: true };
  var el = document.getElementById('co-' + co.id);
  if (el) el.innerHTML = renderBlock(co);
  fetch('/api/opportunities/scan-company', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ workspace_id: parseInt(workspaceId), company_name: co.company_name, li_company_url: co.li_company_url, company_linkedin_id: co.company_linkedin_id })
  }).then(function(r) { return r.json(); })
  .then(function(data) {
    scanResults[co.id] = { scanning: false, contacts: data.contacts || [] };
    var el2 = document.getElementById('co-' + co.id);
    if (el2) el2.innerHTML = renderBlock(co);
  }).catch(function() {
    scanResults[co.id] = { scanning: false, contacts: [] };
    var el3 = document.getElementById('co-' + co.id);
    if (el3) el3.innerHTML = renderBlock(co);
  });
}
function openDM(contactIdx, coId) {
  var res = scanResults[coId];
  if (!res || !res.contacts) return;
  dmTarget = res.contacts[contactIdx];
  dmTarget._coId = coId;
  var nm = ((dmTarget.first_name||'') + ' ' + (dmTarget.last_name||'')).trim() || 'this person';
  document.getElementById('dm-sub').textContent = 'To: ' + nm + (dmTarget.headline ? ' · ' + dmTarget.headline : '');
  document.getElementById('dm-text').value = '';
  document.getElementById('dm-result').textContent = '';
  document.getElementById('dm-send-btn').disabled = false;
  document.getElementById('dm-send-btn').textContent = 'Send';
  var via = dmTarget.connected_via?.[0]?.account_id;
  if (via) {
    document.getElementById('dm-from-sel').value = via;
  }
  document.getElementById('dm-overlay').classList.add('open');
  setTimeout(function(){ document.getElementById('dm-text').focus(); }, 50);
}
function closeDM() {
  document.getElementById('dm-overlay').classList.remove('open');
  dmTarget = null;
}
function sendDM() {
  var msg = document.getElementById('dm-text').value.trim();
  if (!msg) { document.getElementById('dm-result').innerHTML = '<span class="msg-err">Please write a message.</span>'; return; }
  var accId = document.getElementById('dm-from-sel').value;
  if (!accId) { return; }
  var btn = document.getElementById('dm-send-btn');
  btn.disabled = true; btn.textContent = 'Sending...';
  fetch('/api/opportunities/send-dm', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ workspace_id: parseInt(workspaceId), account_id: accId, provider_id: dmTarget.provider_id, li_profile_url: dmTarget.li_profile_url, message: msg })
  }).then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.error) throw new Error(data.error);
    document.getElementById('dm-result').innerHTML = '<span class="msg-ok">&#10003; Message sent successfully!</span>';
    btn.textContent = 'Sent';
    setTimeout(closeDM, 1500);
  }).catch(function(e) {
    document.getElementById('dm-result').innerHTML = '<span class="msg-err">Error: ' + e.message + '</span>';
    btn.disabled = false; btn.textContent = 'Send';
  });
}
document.getElementById('dm-overlay').addEventListener('click', function(e) { if (e.target===this) closeDM(); });
init();
</script>
</body>
</html>
