<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Opportunities</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; font-size: 14px; }
.page { padding: 28px; }
.page-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 16px; }
.page-title { font-size: 22px; font-weight: 600; }
.page-sub { font-size: 14px; color: #666; margin-top: 4px; line-height: 1.4; }
.toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
.search-input { padding: 8px 12px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 13px; width: 260px; font-family: inherit; background: white; }
.search-input:focus { outline: none; border-color: #1D9E75; }
.ghost-btn { background: white; border: 1px solid #e0e0e0; border-radius: 8px; padding: 8px 14px; font-size: 13px; color: #555; cursor: pointer; display: flex; align-items: center; gap: 6px; white-space: nowrap; }
.ghost-btn:hover { background: #f5f5f5; }
.ghost-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.spin { display: inline-block; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.stats-row { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
.stat-chip { background: white; border: 1px solid #e5e5e5; border-radius: 8px; padding: 8px 14px; font-size: 12px; color: #555; white-space: nowrap; }
.stat-chip strong { color: #1a1a1a; font-size: 14px; margin-right: 4px; }
/* Table */
.table-outer { background: white; border: 1px solid #e5e5e5; border-radius: 12px; overflow: hidden; }
table { width: 100%; border-collapse: collapse; }
thead th { background: #fafafa; border-bottom: 1px solid #e5e5e5; padding: 11px 16px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: #888; text-align: left; white-space: nowrap; }
tbody td { padding: 14px 16px; border-bottom: 1px solid #f5f5f5; font-size: 13px; vertical-align: middle; }
tbody tr:last-child > td { border-bottom: none; }
.company-row { cursor: pointer; transition: background 0.1s; }
.company-row:hover td { background: #fafafa; }
.company-row.expanded td { background: #F0FBF7; border-bottom: none; }
.expand-icon { display: inline-block; width: 18px; height: 18px; line-height: 18px; text-align: center; font-size: 11px; transition: transform 0.15s; color: #888; margin-right: 8px; }
.company-row.expanded .expand-icon { transform: rotate(90deg); color: #1D9E75; }
.company-name-cell { display: flex; align-items: center; font-weight: 500; }
.count-badge { display: inline-block; border-radius: 999px; padding: 2px 10px; font-size: 12px; font-weight: 600; min-width: 28px; text-align: center; }
.count-high   { background: #DCFCE7; color: #166534; }
.count-medium { background: #DBEAFE; color: #1D4ED8; }
.count-low    { background: #f5f5f5; color: #888; }
.count-zero   { background: #f5f5f5; color: #ccc; }
.cell-link { color: #1D9E75; text-decoration: none; font-size: 12px; }
.cell-link:hover { text-decoration: underline; }
.cell-muted { color: #aaa; font-size: 12px; }
/* Contacts sub-table */
.contacts-row td { padding: 0; background: #f8fffe; border-bottom: 1px solid #e5e5e5; }
.contacts-inner { padding: 0 16px 16px 42px; }
.contacts-header { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: #888; padding: 12px 0 8px; border-bottom: 1px solid #eee; display: grid; align-items: center; gap: 12px; }
.contact-item { display: grid; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid #f0f0f0; }
.contact-item:last-child { border-bottom: none; }
.contact-name { font-weight: 500; font-size: 13px; }
.contact-title { font-size: 12px; color: #666; margin-top: 1px; }
.contact-company { font-size: 12px; color: #888; }
.msg-btn { background: none; border: 1px solid #1D9E75; border-radius: 6px; padding: 4px 10px; font-size: 12px; color: #1D9E75; cursor: pointer; white-space: nowrap; transition: background 0.1s; display: flex; align-items: center; gap: 5px; }
.msg-btn:hover { background: #F0FBF7; }
.msg-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.campaign-pill { display: inline-block; background: #f0f0f0; color: #666; border-radius: 4px; padding: 2px 6px; font-size: 10px; white-space: nowrap; }
.campaign-pill.active { background: #E1F5EE; color: #0F6E56; }
.no-contacts { padding: 20px 0; text-align: center; color: #aaa; font-size: 13px; }
.empty-state { background: white; border: 1px dashed #e0e0e0; border-radius: 12px; padding: 64px 24px; text-align: center; }
/* Message dialog */
.msg-backdrop { position: fixed; inset: 0; z-index: 80; background: rgba(0,0,0,0.45); display: flex; align-items: center; justify-content: center; padding: 20px; }
.msg-modal { background: white; border-radius: 14px; width: min(560px, 100%); padding: 24px; box-shadow: 0 24px 80px rgba(0,0,0,0.22); }
.msg-modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
.msg-modal-title { font-size: 16px; font-weight: 600; }
.msg-modal-sub { font-size: 12px; color: #888; margin-top: 2px; }
.msg-modal-close { background: none; border: none; font-size: 22px; color: #aaa; cursor: pointer; }
.tokens-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
.token-btn { background: #f5f5f5; border: 1px solid #e0e0e0; border-radius: 999px; padding: 4px 10px; font-size: 12px; color: #555; cursor: pointer; font-family: inherit; }
.token-btn:hover { border-color: #1D9E75; color: #1D9E75; background: #F0FBF7; }
.msg-textarea { width: 100%; padding: 12px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 13px; font-family: inherit; resize: vertical; min-height: 140px; background: #fafafa; line-height: 1.5; }
.msg-textarea:focus { outline: none; border-color: #1D9E75; background: white; }
.char-count { font-size: 11px; color: #aaa; text-align: right; margin-top: 4px; margin-bottom: 16px; }
.msg-footer { display: flex; justify-content: flex-end; gap: 10px; }
.cancel-btn { background: white; border: 1px solid #e0e0e0; border-radius: 8px; padding: 9px 16px; font-size: 13px; color: #555; cursor: pointer; }
.cancel-btn:hover { background: #f5f5f5; }
.send-btn { background: #1D9E75; border: none; border-radius: 8px; padding: 9px 20px; font-size: 13px; font-weight: 500; color: white; cursor: pointer; display: flex; align-items: center; gap: 8px; }
.send-btn:hover { background: #178f68; }
.send-btn:disabled { opacity: 0.6; cursor: not-allowed; }
.send-success { background: #E1F5EE; border: 1px solid #A7F3D0; border-radius: 8px; padding: 12px 14px; color: #0F6E56; font-size: 13px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
.send-error { background: #FEF2F2; border: 1px solid #FECACA; border-radius: 8px; padding: 12px 14px; color: #DC2626; font-size: 13px; margin-bottom: 16px; }
</style>
</head>
<body>
<div class="page">
  <div class="page-header">
    <div>
      <div class="page-title">&#128161; Opportunities</div>
      <div class="page-sub">
        LinkedIn connections you already have at companies you're targeting —<br>
        warm leads ready for direct outreach.
      </div>
    </div>
    <button class="ghost-btn" id="refresh-btn" onclick="load()">
      <span id="refresh-icon">&#x21BB;</span> Refresh
    </button>
  </div>

  <div class="toolbar">
    <input class="search-input" type="search" id="search-input"
           placeholder="Search companies or people..."
           oninput="applyFilter()">
  </div>

  <div class="stats-row" id="stats-row"></div>
  <div id="main-area"><div style="text-align:center;padding:60px;color:#aaa;">Loading opportunities...</div></div>
</div>

<!-- Message dialog -->
<div id="msg-backdrop" class="msg-backdrop" style="display:none;" onclick="closeMsgDialog(event)">
  <div class="msg-modal" onclick="event.stopPropagation()">
    <div class="msg-modal-head">
      <div>
        <div class="msg-modal-title" id="msg-title">Send message</div>
        <div class="msg-modal-sub" id="msg-sub"></div>
      </div>
      <button class="msg-modal-close" onclick="closeMsgDialog()">&times;</button>
    </div>
    <div id="msg-status"></div>
    <div class="tokens-row">
      <button class="token-btn" onclick="insertToken('{{first_name}}')">{{first_name}}</button>
      <button class="token-btn" onclick="insertToken('{{last_name}}')">{{last_name}}</button>
      <button class="token-btn" onclick="insertToken('{{company}}')">{{company}}</button>
    </div>
    <textarea class="msg-textarea" id="msg-textarea"
              placeholder="Hi {{first_name}}, I noticed we're connected and wanted to reach out..."
              oninput="updateCharCount()"></textarea>
    <div class="char-count" id="char-count">0 characters</div>
    <div class="msg-footer">
      <button class="cancel-btn" onclick="closeMsgDialog()">Cancel</button>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">
        &#128172; Send message
      </button>
    </div>
  </div>
</div>

<script>
const urlParams    = new URLSearchParams(window.location.search);
const workspaceId  = urlParams.get('workspace_id');

let allData    = { accounts: [], companies: [] };
let filtered   = [];
let expandedIds = new Set();
let activeContact = null; // { id, first_name, last_name, company, account_id, provider_id, chat_id }

// ── Data loading ──────────────────────────────────────────────────────────────

async function load() {
  const btn  = document.getElementById('refresh-btn');
  const icon = document.getElementById('refresh-icon');
  btn.disabled = true;
  icon.innerHTML = '<span class="spin">&#x21BB;</span>';

  try {
    const data = await fetch(`/api/opportunities?workspace_id=${workspaceId}`).then(r => r.json());
    allData = { accounts: data.accounts || [], companies: data.companies || [] };
    applyFilter();
  } catch (err) {
    document.getElementById('main-area').innerHTML =
      `<div style="color:#DC2626;padding:40px;text-align:center;">Failed to load: ${esc(err.message)}</div>`;
  } finally {
    btn.disabled = false;
    icon.innerHTML = '&#x21BB;';
  }
}

function applyFilter() {
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  if (!q) {
    filtered = allData.companies;
  } else {
    filtered = allData.companies.filter(co => {
      if (co.company_name.toLowerCase().includes(q)) return true;
      return co.contacts.some(c =>
        `${c.first_name} ${c.last_name} ${c.company} ${c.title || ''}`.toLowerCase().includes(q)
      );
    });
  }
  renderStats();
  renderTable();
}

// ── Stats ──────────────────────────────────────────────────────────────────────

function renderStats() {
  const totalCompanies  = filtered.length;
  const withConnections = filtered.filter(c => c.total > 0).length;
  const totalPeople     = filtered.reduce((s, c) => s + c.total, 0);
  const accounts        = allData.accounts;

  let html = `
    <div class="stat-chip"><strong>${totalCompanies}</strong>Target companies</div>
    <div class="stat-chip"><strong>${withConnections}</strong>With connections</div>
    <div class="stat-chip"><strong>${totalPeople}</strong>Total warm leads</div>
  `;
  accounts.forEach(a => {
    const cnt = filtered.reduce((s, co) => s + (co.connections_by_account[a.account_id] || 0), 0);
    html += `<div class="stat-chip"><strong>${cnt}</strong>${esc(a.display_name || a.account_id)}</div>`;
  });
  document.getElementById('stats-row').innerHTML = html;
}

// ── Main table ─────────────────────────────────────────────────────────────────

// Dynamic grid columns: Name | Website | LinkedIn | [per-account...] | Total
function getGridTemplate() {
  const accCount = allData.accounts.length;
  // Name: 1fr, Website: 120px, LinkedIn: 130px, per-account: 90px each, Total: 90px
  const accCols  = allData.accounts.map(() => '90px').join(' ');
  return `1fr 110px 130px ${accCols} 90px`;
}

function countClass(n) {
  if (n === 0) return 'count-zero';
  if (n >= 5)  return 'count-high';
  if (n >= 2)  return 'count-medium';
  return 'count-low';
}

function renderTable() {
  const area = document.getElementById('main-area');
  if (!filtered.length) {
    area.innerHTML = `<div class="empty-state">
      <div style="font-size:32px;margin-bottom:12px;opacity:0.3;">&#128161;</div>
      <div style="font-size:16px;font-weight:500;margin-bottom:6px;">No opportunities found</div>
      <div style="font-size:13px;color:#888;">Add campaigns with company targeting to see warm leads here</div>
    </div>`;
    return;
  }

  const accounts = allData.accounts;
  const grid     = getGridTemplate();

  // Build headers
  const accHeaders = accounts.map(a =>
    `<th style="text-align:center;">${esc(a.display_name || a.account_id)}</th>`
  ).join('');

  let rows = '';
  for (const co of filtered) {
    const id       = encodeId(co.company_name, co.company_linkedin_id);
    const isOpen   = expandedIds.has(id);

    const accCells = accounts.map(a => {
      const n = co.connections_by_account[a.account_id] || 0;
      return `<td style="text-align:center;"><span class="count-badge ${countClass(n)}">${n || '—'}</span></td>`;
    }).join('');

    const totalCls = countClass(co.total);
    const liLink   = co.li_company_url
      ? `<a class="cell-link" href="${esc(safeUrl(co.li_company_url))}" target="_blank" rel="noopener">View page</a>`
      : '<span class="cell-muted">—</span>';

    rows += `<tr class="company-row${isOpen ? ' expanded' : ''}"
              onclick="toggleCompany('${esc(id)}')">
      <td>
        <div class="company-name-cell">
          <span class="expand-icon">&#9654;</span>
          ${esc(co.company_name)}
        </div>
      </td>
      <td>${liLink}</td>
      ${accCells}
      <td style="text-align:center;">
        <span class="count-badge ${totalCls}">${co.total || '—'}</span>
      </td>
      <td style="text-align:right;padding-right:14px;">
        <span style="font-size:11px;color:#aaa;">${co.contacts.length} contact${co.contacts.length !== 1 ? 's' : ''}</span>
      </td>
    </tr>`;

    if (isOpen) {
      rows += `<tr class="contacts-row" id="contacts-row-${esc(id)}">
        <td colspan="${3 + accounts.length + 1 + 1}">
          ${renderContactsDropdown(co)}
        </td>
      </tr>`;
    }
  }

  area.innerHTML = `<div class="table-outer"><table>
    <thead><tr>
      <th style="min-width:200px;">Company</th>
      <th>LinkedIn</th>
      ${accHeaders}
      <th style="text-align:center;">Total</th>
      <th></th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}

function renderContactsDropdown(co) {
  if (!co.contacts.length) {
    return `<div class="contacts-inner"><div class="no-contacts">
      No connected contacts found at this company in your workspace.
    </div></div>`;
  }

  const accounts  = allData.accounts;
  const accCount  = accounts.length;
  // Grid: First | Last | Title | Campaign | LinkedIn | Message
  const gridCols  = '130px 130px 1fr 140px 110px 120px';

  const items = co.contacts.map(c => {
    const canMsg    = !!(c.provider_id || c.chat_id);
    const campClass = c.campaign_status === 'active' ? 'active' : '';
    const msgDisabled = canMsg ? '' : 'disabled title="Contact not enriched yet"';

    return `<div class="contact-item" style="grid-template-columns:${gridCols};">
      <div>
        <div class="contact-name">${esc(c.first_name || '')} ${esc(c.last_name || '')}</div>
      </div>
      <div class="contact-company">${esc(c.company || '—')}</div>
      <div class="contact-title">${esc(c.title || '—')}</div>
      <div>
        ${c.campaign_name
          ? `<span class="campaign-pill ${campClass}">${esc(c.campaign_name)}</span>`
          : '<span class="cell-muted">—</span>'}
      </div>
      <div>
        ${c.li_profile_url
          ? `<a class="cell-link" href="${esc(safeUrl(c.li_profile_url))}" target="_blank" rel="noopener">View profile</a>`
          : '<span class="cell-muted">—</span>'}
      </div>
      <div>
        <button class="msg-btn" ${msgDisabled}
          onclick="openMsgDialog(${JSON.stringify(c).replace(/'/g,'&#39;')})">
          &#128172; Message
        </button>
      </div>
    </div>`;
  }).join('');

  const headerCols = gridCols;
  return `<div class="contacts-inner">
    <div class="contacts-header" style="grid-template-columns:${headerCols};">
      <span>Name</span>
      <span>Company</span>
      <span>Title</span>
      <span>Campaign</span>
      <span>Profile</span>
      <span></span>
    </div>
    ${items}
  </div>`;
}

// ── Toggle expand ──────────────────────────────────────────────────────────────

function toggleCompany(id) {
  if (expandedIds.has(id)) {
    expandedIds.delete(id);
  } else {
    expandedIds.add(id);
  }
  renderTable();
}

// ── Message dialog ─────────────────────────────────────────────────────────────

function openMsgDialog(contact) {
  activeContact = contact;
  const name = `${contact.first_name || ''} ${contact.last_name || ''}`.trim();
  document.getElementById('msg-title').textContent = `Message ${name}`;
  document.getElementById('msg-sub').textContent   =
    `${contact.title || ''}${contact.title && contact.company ? ' · ' : ''}${contact.company || ''}`;
  document.getElementById('msg-textarea').value = '';
  document.getElementById('msg-status').innerHTML = '';
  document.getElementById('send-btn').disabled = false;
  document.getElementById('send-btn').innerHTML = '&#128172; Send message';
  updateCharCount();
  document.getElementById('msg-backdrop').style.display = 'flex';
  setTimeout(() => document.getElementById('msg-textarea').focus(), 50);
}

function closeMsgDialog(e) {
  if (e && e.target !== document.getElementById('msg-backdrop')) return;
  document.getElementById('msg-backdrop').style.display = 'none';
  activeContact = null;
}

function insertToken(token) {
  const ta = document.getElementById('msg-textarea');
  const p  = ta.selectionStart;
  ta.value = ta.value.slice(0, p) + token + ta.value.slice(p);
  ta.selectionStart = ta.selectionEnd = p + token.length;
  ta.focus();
  updateCharCount();
}

function updateCharCount() {
  const text = document.getElementById('msg-textarea').value;
  document.getElementById('char-count').textContent = `${text.length} characters`;
}

function substituteTokens(text, contact) {
  return text
    .replace(/\{\{first_name\}\}/g, contact.first_name || '')
    .replace(/\{\{last_name\}\}/g,  contact.last_name  || '')
    .replace(/\{\{company\}\}/g,    contact.company    || '');
}

async function sendMessage() {
  if (!activeContact) return;

  const rawText = document.getElementById('msg-textarea').value.trim();
  if (!rawText) { document.getElementById('msg-textarea').focus(); return; }

  const text = substituteTokens(rawText, activeContact);

  const btn = document.getElementById('send-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin">&#x21BB;</span> Sending…';
  document.getElementById('msg-status').innerHTML = '';

  try {
    const res = await fetch('/api/opportunities/send-message', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contact_id: activeContact.id, text }),
    });
    const data = await res.json();

    if (!res.ok) throw new Error(data.error || 'Send failed');

    document.getElementById('msg-status').innerHTML =
      `<div class="send-success">&#10003; Message sent to ${esc(activeContact.first_name)}!</div>`;
    document.getElementById('msg-textarea').value = '';
    updateCharCount();
    btn.disabled = false;
    btn.innerHTML = '&#128172; Send message';

    // Close after 1.5s
    setTimeout(() => {
      document.getElementById('msg-backdrop').style.display = 'none';
      activeContact = null;
    }, 1500);

  } catch (err) {
    document.getElementById('msg-status').innerHTML =
      `<div class="send-error">&#10007; ${esc(err.message)}</div>`;
    btn.disabled = false;
    btn.innerHTML = '&#128172; Send message';
  }
}

// ── Utilities ──────────────────────────────────────────────────────────────────

function esc(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function safeUrl(u) {
  if (!u) return '';
  u = u.trim();
  return /^https?:\/\//i.test(u) ? u : 'https://' + u;
}

function encodeId(name, linkedinId) {
  return (linkedinId || name || '').replace(/[^a-z0-9]/gi, '_');
}

// ── Init ───────────────────────────────────────────────────────────────────────
load();
</script>
</body>
</html>
